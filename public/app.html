/* ════════════════════════════════════════════
   CONCERT CANVAS (Hero Background)
════════════════════════════════════════════ */
function ConcertCanvas(){
  const canvasRef=useRef(null);
  const scrollRef=useRef(0);
  const tRef=useRef(0);
  const rafRef=useRef(null);
  const singerImgRef=useRef(null);
  const audioCtxRef=useRef(null);
  const musicStartedRef=useRef(false);

  // ── WEB AUDIO: start concert music on first user interaction ──
  function startMusic(){
    if(musicStartedRef.current)return;
    musicStartedRef.current=true;
    try{
      const ac=new(window.AudioContext||window.webkitAudioContext)();
      audioCtxRef.current=ac;
      const master=ac.createGain();master.gain.value=0.18;master.connect(ac.destination);
      const rev=ac.createConvolver();
      const revBuf=ac.createBuffer(2,ac.sampleRate*2,ac.sampleRate);
      for(let c=0;c<2;c++){const d=revBuf.getChannelData(c);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);}
      rev.buffer=revBuf;const revGain=ac.createGain();revGain.gain.value=0.35;rev.connect(revGain);revGain.connect(master);

      function note(freq,start,dur,vol=0.5,type="sine"){
        const o=ac.createOscillator(),g=ac.createGain();
        o.type=type;o.frequency.value=freq;
        g.gain.setValueAtTime(0,ac.currentTime+start);
        g.gain.linearRampToValueAtTime(vol,ac.currentTime+start+0.02);
        g.gain.linearRampToValueAtTime(0,ac.currentTime+start+dur);
        o.connect(g);g.connect(master);g.connect(rev);
        o.start(ac.currentTime+start);o.stop(ac.currentTime+start+dur+0.05);
      }

      function drum(freq,start,dur,vol=0.6){
        const o=ac.createOscillator(),g=ac.createGain();
        o.type="sine";o.frequency.setValueAtTime(freq,ac.currentTime+start);
        o.frequency.exponentialRampToValueAtTime(freq*0.3,ac.currentTime+start+dur);
        g.gain.setValueAtTime(vol,ac.currentTime+start);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+start+dur);
        o.connect(g);g.connect(master);
        o.start(ac.currentTime+start);o.stop(ac.currentTime+start+dur+0.05);
      }

      function hihat(start,vol=0.15){
        const buf=ac.createBuffer(1,ac.sampleRate*0.05,ac.sampleRate);
        const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
        const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
        f.type="highpass";f.frequency.value=8000;
        src.buffer=buf;g.gain.setValueAtTime(vol,ac.currentTime+start);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+start+0.05);
        src.connect(f);f.connect(g);g.connect(master);src.start(ac.currentTime+start);
      }

      // Rock-style chord progression: Am - F - C - G
      const chords={
        Am:[220,261.63,329.63],
        F:[174.61,220,261.63],
        C:[261.63,329.63,392],
        G:[196,246.94,293.66]
      };
      const prog=["Am","F","C","G"];
      const beat=0.45; // tempo
      let t2=0.1;

      // Play 4 bars looping
      function playBar(startT){
        prog.forEach((chord,ci)=>{
          const cs=startT+ci*(beat*4);
          chords[chord].forEach((freq,fi)=>{
            note(freq,cs+fi*0.01,beat*3.8,0.12,"sawtooth");
            note(freq*2,cs+fi*0.01,beat*0.5,0.06,"triangle");
          });
          // Bass note
          note(chords[chord][0]*0.5,cs,beat*3.9,0.25,"sawtooth");
          // Rhythm strums
          for(let s=0;s<8;s++){
            const sv=s%2===0?0.07:0.04;
            note(chords[chord][1],cs+s*beat*0.5,beat*0.4,sv,"triangle");
          }
          // Drums
          drum(60,cs,0.3,0.7); // kick
          drum(60,cs+beat*2,0.3,0.6);
          drum(200,cs+beat,0.15,0.5); // snare
          drum(200,cs+beat*3,0.15,0.5);
          for(let h=0;h<8;h++)hihat(cs+h*beat*0.5,h%2===0?0.12:0.08);
        });
      }

      // Loop music
      const barLen=beat*4*4;
      playBar(0.1);
      function loopScheduler(){
        const elapsed=(ac.currentTime-0.1);
        const barNum=Math.floor(elapsed/barLen);
        const nextBar=(barNum+1)*barLen+0.1;
        if(nextBar-ac.currentTime<0.5)playBar(nextBar+0.0);
        setTimeout(loopScheduler,300);
      }
      setTimeout(loopScheduler,300);
    }catch(e){console.warn("Audio failed",e);}
  }

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    let W=canvas.width=canvas.offsetWidth||window.innerWidth;
    let H=canvas.height=canvas.offsetHeight||window.innerHeight;
    const onResize=()=>{W=canvas.width=canvas.offsetWidth||window.innerWidth;H=canvas.height=canvas.offsetHeight||window.innerHeight;};
    window.addEventListener("resize",onResize);
    const onScroll=()=>{scrollRef.current=window.scrollY;};
    window.addEventListener("scroll",onScroll,{passive:true});

    // Preload singer image
    const singerImg=new Image();
    singerImg.src=SINGER_IMAGE_B64;
    singerImg.onload=()=>{singerImgRef.current=singerImg;};

    // Start music on first click/touch
    const startOnInteract=()=>{startMusic();};
    window.addEventListener("click",startOnInteract,{once:true});
    window.addEventListener("touchstart",startOnInteract,{once:true});


    // ── CROWD ──
    const NUM_CROWD=80;
    const SKIN_TONES=["#c9956a","#a0704a","#d4a574","#8b5e3c","#f0c080","#7a4a2a","#e8b880"];
    const SHIRT_COLS=["#1a1a3a","#2a0a1a","#0a1a2a","#1a2a0a","#2a1a0a","#3a0a3a","#0a2a2a","#1a0a3a"];
    const crowd=Array.from({length:NUM_CROWD},(_,i)=>{
      const row=Math.floor(i/(NUM_CROWD/4));
      const col=i%(NUM_CROWD/4);
      const xSpread=85;
      const xBase=7.5+(col/(NUM_CROWD/4-1))*xSpread;
      const xJitter=(Math.random()-0.5)*8;
      return{
        x:Math.max(3,Math.min(97,xBase+xJitter)),
        row,
        baseDepth:0.7+row*0.07,
        phase:Math.random()*Math.PI*2,
        armPhase:Math.random()*Math.PI*2,
        bodyPhase:Math.random()*Math.PI*2,
        size:(1-row*0.06)*(0.85+Math.random()*0.3),
        skin:SKIN_TONES[Math.floor(Math.random()*SKIN_TONES.length)],
        shirt:SHIRT_COLS[Math.floor(Math.random()*SHIRT_COLS.length)],
        hasPhone:Math.random()>0.4,
        phonePhase:Math.random()*Math.PI*2,
        phoneOnDur:60+Math.random()*120,
        phoneOffDur:30+Math.random()*90,
        phoneTimer:Math.floor(Math.random()*200),
        phoneOn:Math.random()>0.5,
        armStyle:Math.floor(Math.random()*3), // 0=both up, 1=left up, 2=wave
      };
    });

    // ── FIRECRACKERS ──
    const firecrackers=[];
    const flowerBursts=[];
    function spawnFlower(x,y,col){flowerBursts.push({x,y,col,life:0,maxLife:70});}
    function drawFlowers(){for(let i=flowerBursts.length-1;i>=0;i--){const fb=flowerBursts[i];fb.life++;const p=fb.life/fb.maxLife;const ease=p<0.25?(p/0.25):(1-(p-0.25)/0.75);ctx.save();ctx.translate(fb.x,fb.y);const maxR=Math.min(W,H)*0.2*ease;const baseHue=parseInt((fb.col.match(/\d+/)||[200])[0]);for(let ring=0;ring<4;ring++){const rR=maxR*(0.25+ring*0.28);const rPetals=8+ring*4;ctx.save();ctx.rotate(p*(ring%2===0?1:-1)*Math.PI*0.6);for(let pet=0;pet<rPetals;pet++){const ang=(pet/rPetals)*Math.PI*2;ctx.globalAlpha=ease*0.82;ctx.fillStyle='hsl('+(baseHue+ring*30+pet*7)+',100%,70%)';ctx.beginPath();ctx.ellipse(Math.cos(ang)*rR,Math.sin(ang)*rR,rR*0.13,rR*0.36,ang+Math.PI/2,0,Math.PI*2);ctx.fill();}ctx.restore();}const cg=ctx.createRadialGradient(0,0,0,0,0,maxR*0.22);cg.addColorStop(0,'rgba(255,255,255,'+(ease*0.95)+')');cg.addColorStop(0.5,'hsla('+(baseHue)+',100%,70%,'+(ease*0.7)+')');cg.addColorStop(1,'transparent');ctx.globalAlpha=ease;ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,maxR*0.22,0,Math.PI*2);ctx.fill();ctx.globalAlpha=ease*0.5;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;for(let r2=0;r2<20;r2++){const ra=(r2/20)*Math.PI*2+p*Math.PI;ctx.beginPath();ctx.moveTo(Math.cos(ra)*maxR*0.1,Math.sin(ra)*maxR*0.1);ctx.lineTo(Math.cos(ra)*maxR*0.92,Math.sin(ra)*maxR*0.92);ctx.stroke();}ctx.globalAlpha=1;ctx.restore();if(fb.life>=fb.maxLife)flowerBursts.splice(i,1);}}
    function spawnFirecracker(W,H){
      firecrackers.push({
        x:W*(0.05+Math.random()*0.9),
        y:H*0.85,
        vy:-(7+Math.random()*6),
        life:0,
        burst:false,
        burstLife:0,
        col:`hsl(${Math.floor(Math.random()*360)},100%,65%)`,
        particles:[],
        trailX:[],trailY:[],
      });
    }
    let fcTimer=0;

    // ── LIGHTS ──
    const lights=[
      {x:0.05,col:"#a855f7",phase:0,angle:0.3},
      {x:0.18,col:"#00f5ff",phase:1.1,angle:-0.1},
      {x:0.32,col:"#f5ff00",phase:2.0,angle:0.15},
      {x:0.5,col:"#ffffff",phase:0.5,angle:0},
      {x:0.62,col:"#00e5ff",phase:1.7,angle:-0.2},
      {x:0.75,col:"#9b4dff",phase:0.8,angle:0.1},
      {x:0.88,col:"#00f5ff",phase:2.4,angle:-0.15},
      {x:0.95,col:"#ff6b00",phase:1.3,angle:0.25},
    ];

    function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}

    // ── DRAW CROWD PERSON (flat illustrated style) ──
    function drawCrowdPerson(p,t,crowdBaseY){
      const s=p.size*(W/1400+0.4);
      const depth=1-p.row*0.12;
      const crowdY=crowdBaseY-(p.row*H*0.055);
      const px=p.x/100*W;
      const sway=Math.sin(t*0.028+p.phase)*3*depth;
      const bodyBob=Math.sin(t*0.055+p.bodyPhase)*2*depth;

      ctx.save();
      ctx.translate(px+sway,crowdY+bodyBob);
      ctx.scale(s*depth,s*depth);

      // Legs
      ctx.strokeStyle=p.shirt;ctx.lineWidth=7;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-7,22);ctx.stroke();
      ctx.beginPath();ctx.moveTo(5,0);ctx.lineTo(8,22);ctx.stroke();

      // Body/shirt
      ctx.fillStyle=p.shirt;
      ctx.beginPath();ctx.roundRect(-13,-30,26,32,3);ctx.fill();

      // Shoulders/neck
      ctx.fillStyle=p.skin;
      ctx.beginPath();ctx.roundRect(-4,-34,8,8,2);ctx.fill();

      // Arms
      const armT=t*0.04+p.armPhase;
      if(p.armStyle===0){
        // Both arms up waving
        const lAng=-Math.PI*0.7-Math.sin(armT)*0.25;
        const rAng=-Math.PI*0.7+Math.sin(armT+0.5)*0.25;
        ctx.strokeStyle=p.shirt;ctx.lineWidth=7;
        ctx.beginPath();ctx.moveTo(-13,-18);ctx.lineTo(-13+Math.cos(lAng)*22,-18+Math.sin(lAng)*22);ctx.stroke();
        ctx.beginPath();ctx.moveTo(13,-18);ctx.lineTo(13+Math.cos(Math.PI-rAng)*22,-18+Math.sin(rAng)*22);ctx.stroke();
        // Hands
        ctx.fillStyle=p.skin;
        ctx.beginPath();ctx.arc(-13+Math.cos(lAng)*22,-18+Math.sin(lAng)*22,5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(13+Math.cos(Math.PI-rAng)*22,-18+Math.sin(rAng)*22,5,0,Math.PI*2);ctx.fill();
      } else if(p.armStyle===1){
        // Left arm up, right wave
        const lAng=-Math.PI*0.75-Math.sin(armT)*0.2;
        const rAng=-Math.PI*0.4+Math.sin(armT*0.8)*0.3;
        ctx.strokeStyle=p.shirt;ctx.lineWidth=7;
        ctx.beginPath();ctx.moveTo(-13,-18);ctx.lineTo(-13+Math.cos(lAng)*22,-18+Math.sin(lAng)*22);ctx.stroke();
        ctx.beginPath();ctx.moveTo(13,-18);ctx.lineTo(13+Math.cos(rAng)*20,-18+Math.sin(rAng)*20);ctx.stroke();
        ctx.fillStyle=p.skin;
        ctx.beginPath();ctx.arc(-13+Math.cos(lAng)*22,-18+Math.sin(lAng)*22,5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(13+Math.cos(rAng)*20,-18+Math.sin(rAng)*20,5,0,Math.PI*2);ctx.fill();
      } else {
        // Both waving at shoulder height
        const la=-Math.PI*0.5+Math.sin(armT)*0.4;
        const ra=-Math.PI*0.5-Math.sin(armT+0.3)*0.4;
        ctx.strokeStyle=p.shirt;ctx.lineWidth=7;
        ctx.beginPath();ctx.moveTo(-13,-18);ctx.lineTo(-13+Math.cos(la)*20,-18+Math.sin(la)*20);ctx.stroke();
        ctx.beginPath();ctx.moveTo(13,-18);ctx.lineTo(13-Math.cos(ra)*20,-18+Math.sin(ra)*20);ctx.stroke();
        ctx.fillStyle=p.skin;
        ctx.beginPath();ctx.arc(-13+Math.cos(la)*20,-18+Math.sin(la)*20,5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(13-Math.cos(ra)*20,-18+Math.sin(ra)*20,5,0,Math.PI*2);ctx.fill();
      }

      // Head
      const headGrad=ctx.createRadialGradient(-3,-44,3,0,-44,14);
      headGrad.addColorStop(0,p.skin);headGrad.addColorStop(1,p.skin.replace("rgb","rgba").replace(")"," 0.8)"));
      ctx.fillStyle=p.skin;
      ctx.beginPath();ctx.arc(0,-44,12,0,Math.PI*2);ctx.fill();

      // Hair (simple)
      ctx.fillStyle="#1a0a00";
      ctx.beginPath();ctx.ellipse(0,-52,13,8,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-10,-46,6,5,-0.3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(10,-46,6,5,0.3,0,Math.PI*2);ctx.fill();

      // Eyes (simple dots)
      ctx.fillStyle="#000";
      ctx.beginPath();ctx.arc(-4,-44,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(4,-44,1.5,0,Math.PI*2);ctx.fill();

      // Phone with glowing screen
      if(p.hasPhone){
        // Update phone state
        p.phoneTimer++;
        if(p.phoneOn&&p.phoneTimer>p.phoneOnDur){p.phoneOn=false;p.phoneTimer=0;p.phoneOffDur=30+Math.random()*90;}
        else if(!p.phoneOn&&p.phoneTimer>p.phoneOffDur){p.phoneOn=true;p.phoneTimer=0;p.phoneOnDur=60+Math.random()*120;}

        // Draw phone in raised hand area
        const handX=p.armStyle===0?-13+Math.cos(-Math.PI*0.7-Math.sin(armT)*0.25)*22:13+Math.cos(Math.PI*0.3)*20;
        const handY=p.armStyle===0?-18+Math.sin(-Math.PI*0.7-Math.sin(armT)*0.25)*22:-18+Math.sin(-Math.PI*0.4)*20;
        ctx.fillStyle="#1a1a2a";
        ctx.beginPath();ctx.roundRect(handX-4,handY-10,8,14,1);ctx.fill();
        if(p.phoneOn){
          const screenBrightness=0.5+0.5*Math.sin(t*0.08+p.phonePhase);
          ctx.fillStyle=`rgba(240,250,255,${0.6+screenBrightness*0.4})`;
          ctx.beginPath();ctx.roundRect(handX-3,handY-9,6,12,1);ctx.fill();
          // Screen glow
          ctx.globalAlpha=0.25*screenBrightness;
          const glowGrad=ctx.createRadialGradient(handX,handY,2,handX,handY,20);
          glowGrad.addColorStop(0,"rgba(220,240,255,1)");glowGrad.addColorStop(1,"transparent");
          ctx.fillStyle=glowGrad;ctx.beginPath();ctx.arc(handX,handY,20,0,Math.PI*2);ctx.fill();
          ctx.globalAlpha=1;
        }
      }

      ctx.restore();
    }

    // ── DRAW SINGER (image-based, animated) ──
    function drawSinger(t){
      const img=singerImgRef.current;
      const singerX=W*0.60;
      const stageY=H*0.82;
      const bob=Math.sin(t*0.028)*3;
      const breathe=1+Math.sin(t*0.04)*0.01;
      const singerH=H*0.42;
      const singerW=singerH;
      const feetY=stageY-2;
      const centerX=singerX;
      const centerY=feetY-singerH*0.5;
      const spotGrad=ctx.createRadialGradient(singerX,0,10,singerX,H*0.45,W*0.18);
      spotGrad.addColorStop(0,"rgba(255,220,130,0.32)");
      spotGrad.addColorStop(0.45,"rgba(255,150,60,0.14)");
      spotGrad.addColorStop(1,"transparent");
      ctx.fillStyle=spotGrad;
      ctx.beginPath();ctx.ellipse(singerX,H*0.38,W*0.18,H*0.42,0,0,Math.PI*2);ctx.fill();
      const shadGrad=ctx.createRadialGradient(centerX,feetY+5,3,centerX,feetY+7,singerW*0.36);
      shadGrad.addColorStop(0,"rgba(0,0,0,0.65)");
      shadGrad.addColorStop(1,"transparent");
      ctx.fillStyle=shadGrad;
      ctx.beginPath();ctx.ellipse(centerX,feetY+7,singerW*0.33,11,0,0,Math.PI*2);ctx.fill();
      if(img){
        ctx.save();
        ctx.translate(centerX,centerY+bob);
        ctx.scale(breathe,breathe);
        const aura=ctx.createRadialGradient(0,0,6,0,0,singerW*0.52);
        aura.addColorStop(0,"rgba(180,140,255,0.22)");
        aura.addColorStop(0.5,"rgba(100,80,200,0.12)");
        aura.addColorStop(1,"transparent");
        ctx.fillStyle=aura;
        ctx.beginPath();ctx.ellipse(0,0,singerW*0.52,singerH*0.50,0,0,Math.PI*2);ctx.fill();
        ctx.globalCompositeOperation="screen";
        ctx.drawImage(img,-singerW*0.5,-singerH*0.5,singerW,singerH);
        ctx.globalCompositeOperation="source-over";
        ctx.globalAlpha=0.12;
        const stageLight=ctx.createLinearGradient(0,singerH*0.1,0,singerH*0.5);
        stageLight.addColorStop(0,"transparent");
        stageLight.addColorStop(1,"rgba(255,100,30,1)");
        ctx.fillStyle=stageLight;
        ctx.fillRect(-singerW*0.5,singerH*0.08,singerW,singerH*0.44);
        ctx.globalAlpha=1.0;
        ctx.restore();
        const feetGlow=ctx.createRadialGradient(centerX,feetY,2,centerX,feetY,singerW*0.48);
        feetGlow.addColorStop(0,"rgba(255,150,50,0.60)");
        feetGlow.addColorStop(0.4,"rgba(255,80,20,0.20)");
        feetGlow.addColorStop(1,"transparent");
        ctx.fillStyle=feetGlow;
        ctx.beginPath();ctx.ellipse(centerX,feetY,singerW*0.48,15,0,0,Math.PI*2);ctx.fill();
      } else {
        ctx.save();
        ctx.translate(singerX,stageY-H*0.12+bob);
        ctx.fillStyle="rgba(255,180,100,0.2)";
        ctx.beginPath();ctx.roundRect(-20,-H*0.20,40,H*0.22,3);ctx.fill();
        ctx.restore();
      }
    }
    // ── FIRECRACKER ──
    function updateFirecrackers(t,W,H){
      // Spawn new ones periodically
      fcTimer++;
      if(fcTimer>40+Math.random()*30){fcTimer=0;spawnFirecracker(W,H);}

      for(let i=firecrackers.length-1;i>=0;i--){
        const fc=firecrackers[i];
        if(!fc.burst){
          fc.y+=fc.vy;fc.vy+=0.12; // slight gravity
          fc.life++;
          // Trail
          fc.trailX.push(fc.x);fc.trailY.push(fc.y);
          if(fc.trailX.length>30){fc.trailX.shift();fc.trailY.shift();}
          // Draw trail
          for(let ti=0;ti<fc.trailX.length;ti++){
            const alpha=(ti/fc.trailX.length)*0.7;
            const sz=1.5*(ti/fc.trailX.length);
            ctx.globalAlpha=alpha;
            ctx.fillStyle=fc.col;
            ctx.beginPath();ctx.arc(fc.trailX[ti],fc.trailY[ti],sz,0,Math.PI*2);ctx.fill();
          }
          ctx.globalAlpha=1;
          // Draw rocket head
          const headGrad=ctx.createRadialGradient(fc.x,fc.y,0,fc.x,fc.y,5);
          headGrad.addColorStop(0,"#ffffff");headGrad.addColorStop(0.4,fc.col);headGrad.addColorStop(1,"transparent");
          ctx.fillStyle=headGrad;ctx.beginPath();ctx.arc(fc.x,fc.y,5,0,Math.PI*2);ctx.fill();
          // Burst when reaching top area
          if(fc.y<H*0.07||fc.life>160){
            fc.burst=true;
            fc.burstLife=0;
            if(fc.y<H*0.25)spawnFlower(fc.x,fc.y,fc.col);
            // Create burst particles
            const numP=55+Math.floor(Math.random()*35);
            for(let p=0;p<numP;p++){
              const ang=(p/numP)*Math.PI*2+Math.random()*0.3;
              const spd=2+Math.random()*4;
              const cols=[fc.col,"#ffffff","#ffff88",`hsl(${Math.random()*360},100%,75%)`];
              fc.particles.push({
                x:fc.x,y:fc.y,
                vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
                life:0,maxLife:40+Math.random()*40,
                col:cols[Math.floor(Math.random()*cols.length)],
                size:1.5+Math.random()*2.5,
                sparkle:Math.random()>0.5,
              });
            }
            // Burst flash
            ctx.globalAlpha=0.5;
            const burst=ctx.createRadialGradient(fc.x,fc.y,0,fc.x,fc.y,60);
            burst.addColorStop(0,"rgba(255,255,255,0.9)");
            burst.addColorStop(0.3,fc.col.replace("hsl","hsla").replace(")",",0.6)"));
            burst.addColorStop(1,"transparent");
            ctx.fillStyle=burst;ctx.beginPath();ctx.arc(fc.x,fc.y,60,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=1;
          }
        } else {
          fc.burstLife++;
          // Draw burst particles
          let allDead=true;
          for(const p of fc.particles){
            p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.98;p.life++;
            const alive=p.life<p.maxLife;
            if(alive)allDead=false;
            const alpha=alive?(1-p.life/p.maxLife):0;
            if(alpha>0){
              ctx.globalAlpha=alpha;
              if(p.sparkle&&p.life%3<1){
                // Star sparkle
                ctx.fillStyle="#fff";
                ctx.beginPath();ctx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);ctx.fill();
              }
              ctx.fillStyle=p.col;
              ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
              // Particle trail
              ctx.globalAlpha=alpha*0.3;
              ctx.fillStyle=p.col;
              ctx.beginPath();ctx.arc(p.x-p.vx*2,p.y-p.vy*2,p.size*0.7,0,Math.PI*2);ctx.fill();
              ctx.globalAlpha=1;
            }
          }
          if(allDead)firecrackers.splice(i,1);
        }
      }
    }

    function draw(){
      const t=tRef.current;
      const scroll=scrollRef.current;

      W=canvas.width=canvas.offsetWidth||window.innerWidth;
      H=canvas.height=canvas.offsetHeight||window.innerHeight;
      ctx.clearRect(0,0,W,H);

      // ── CONCERT BG ──
      const bgGrad=ctx.createLinearGradient(0,0,0,H);
      bgGrad.addColorStop(0,"rgba(8,3,20,0.97)");
      bgGrad.addColorStop(0.4,"rgba(15,8,35,0.95)");
      bgGrad.addColorStop(0.8,"rgba(25,12,50,0.9)");
      bgGrad.addColorStop(1,"rgba(5,2,12,0.98)");
      ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

      // Bokeh dots in BG (like image)
      const bokehCols=["rgba(255,120,40,","rgba(80,60,200,","rgba(255,50,120,","rgba(40,120,255,"];
      for(let b=0;b<18;b++){
        const bx=((b*137+t*0.1)%100)/100*W;
        const by=((b*97+t*0.05)%100)/100*H*0.8;
        const br=15+Math.sin(t*0.03+b)*8;
        const ba=0.06+0.04*Math.sin(t*0.05+b*0.7);
        const bcol=bokehCols[b%bokehCols.length];
        const bokGrad=ctx.createRadialGradient(bx,by,0,bx,by,br);
        bokGrad.addColorStop(0,bcol+(ba*2)+")");bokGrad.addColorStop(1,bcol+"0)");
        ctx.fillStyle=bokGrad;ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
      }

      const parallaxY=-scroll*0.3;
      ctx.save();ctx.translate(0,parallaxY);

      // ── LIGHT BEAMS ──
      const scroll50=scroll>30;
      lights.forEach((l,i)=>{
        const speed=0.022+i*0.004;
        const intensity=scroll50
          ?(0.45+0.55*Math.abs(Math.sin(t*speed+l.phase)))
          :(0.18+0.12*Math.sin(t*0.018+l.phase));
        const lx=l.x*W;
        const {r,g,b}=hexToRgb(l.col);
        // Beam
        const beamTipX=lx+Math.sin(l.angle+t*0.008)*W*0.06;
        const beamGrad=ctx.createLinearGradient(lx,0,beamTipX,H*0.82);
        beamGrad.addColorStop(0,`rgba(${r},${g},${b},${intensity*0.9})`);
        beamGrad.addColorStop(0.25,`rgba(${r},${g},${b},${intensity*0.3})`);
        beamGrad.addColorStop(1,`rgba(${r},${g},${b},0.01)`);
        const spread=W*0.055+intensity*W*0.045;
        ctx.beginPath();
        ctx.moveTo(lx-3,0);ctx.lineTo(lx+3,0);
        ctx.lineTo(beamTipX+spread,H*0.84);ctx.lineTo(beamTipX-spread,H*0.84);
        ctx.closePath();ctx.fillStyle=beamGrad;ctx.fill();
        // Bulb
        const bulb=ctx.createRadialGradient(lx,0,0,lx,0,16);
        bulb.addColorStop(0,`rgba(${r},${g},${b},${0.9+intensity*0.1})`);
        bulb.addColorStop(0.4,`rgba(${r},${g},${b},0.4)`);
        bulb.addColorStop(1,"transparent");
        ctx.fillStyle=bulb;ctx.beginPath();ctx.arc(lx,0,16,0,Math.PI*2);ctx.fill();
        // Light rig bar
        ctx.strokeStyle=`rgba(${r},${g},${b},0.5)`;ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(lx-8,0);ctx.lineTo(lx+8,0);ctx.stroke();
      });
      // Rig horizontal bar
      ctx.strokeStyle="rgba(60,40,80,0.8)";ctx.lineWidth=6;
      ctx.beginPath();ctx.moveTo(0,4);ctx.lineTo(W,4);ctx.stroke();

      // ── STAGE FLOOR ──
      const floorGrad=ctx.createLinearGradient(0,H*0.78,0,H);
      floorGrad.addColorStop(0,"rgba(30,15,55,0.95)");
      floorGrad.addColorStop(0.5,"rgba(15,8,30,0.98)");
      floorGrad.addColorStop(1,"rgba(5,2,12,1)");
      ctx.fillStyle=floorGrad;ctx.fillRect(0,H*0.78,W,H*0.22);
      // Stage front edge
      ctx.fillStyle="rgba(80,40,120,0.7)";ctx.fillRect(0,H*0.82,W,5);
      ctx.fillStyle="rgba(0,229,255,0.4)";ctx.fillRect(0,H*0.82,W,2);
      // Stage glow
      const sgGrad=ctx.createLinearGradient(0,H*0.75,0,H*0.85);
      sgGrad.addColorStop(0,"transparent");sgGrad.addColorStop(1,"rgba(255,80,40,0.08)");
      ctx.fillStyle=sgGrad;ctx.fillRect(0,H*0.75,W,H*0.1);

      // ── SINGER ──
      drawSinger(t);

      // ── CROWD ── (draw back rows first - depth ordering)
      const crowdBaseY=H*0.86;
      [...crowd].reverse().forEach(p=>{
        drawCrowdPerson(p,t,crowdBaseY);
      });

      // ── CROWD FRONT HAZE ──
      const hazeGrad=ctx.createLinearGradient(0,H*0.72,0,H);
      hazeGrad.addColorStop(0,"transparent");
      hazeGrad.addColorStop(0.35,"rgba(12,5,28,0.18)");
      hazeGrad.addColorStop(0.7,"rgba(7,3,16,0.55)");
      hazeGrad.addColorStop(1,"rgba(5,2,12,0.92)");
      ctx.fillStyle=hazeGrad;ctx.fillRect(0,H*0.72,W,H*0.28);

      // ── SMOKE EFFECTS ──
      for(let sm=0;sm<6;sm++){
        const smx=W*(0.1+sm*0.15),smy=H*0.82+Math.sin(t*0.012+sm*1.1)*4;
        const smr=W*0.07+Math.sin(t*0.02+sm)*W*0.02;
        const smGrad=ctx.createRadialGradient(smx,smy,0,smx,smy,smr);
        smGrad.addColorStop(0,"rgba(200,180,255,0.06)");smGrad.addColorStop(1,"transparent");
        ctx.fillStyle=smGrad;ctx.beginPath();ctx.ellipse(smx,smy,smr,smr*0.35,0,0,Math.PI*2);ctx.fill();
      }

      // ── FIRECRACKERS ──
      updateFirecrackers(t,W,H);

      ctx.restore();
      drawFlowers();

      // ── FINAL OVERLAY ──
      const overGrad=ctx.createLinearGradient(0,0,0,H);
      overGrad.addColorStop(0,"rgba(7,7,16,0)");
      overGrad.addColorStop(0.82,"rgba(7,7,16,0)");
      overGrad.addColorStop(1,"rgba(7,7,16,1)");
      ctx.fillStyle=overGrad;ctx.fillRect(0,0,W,H);

      tRef.current+=1;
      rafRef.current=requestAnimationFrame(draw);
    }
    draw();
    return()=>{
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener("resize",onResize);
      window.removeEventListener("scroll",onScroll);
      window.removeEventListener("click",startOnInteract);
      window.removeEventListener("touchstart",startOnInteract);
      if(audioCtxRef.current)try{audioCtxRef.current.close();}catch(e){}
    };
  },[]);

  return(
    <div style={{position:"absolute",inset:0}}>
      <canvas ref={canvasRef} id="concert-canvas" style={{position:"absolute",inset:0,width:"100%",height:"100%",display:"block"}}/>
      <div style={{position:"absolute",bottom:"1.5rem",right:"1.5rem",zIndex:20,fontSize:".65rem",fontWeight:700,letterSpacing:".1em",color:"rgba(255,255,255,.25)",textTransform:"uppercase"}}>
        🎵 Click anywhere for music
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   AUDIO VISUALIZER
════════════════════════════════════════════ */
function AudioVisualizer(){
  const canvasRef=useRef(null);
  const rafRef=useRef(null);
  const tRef=useRef(0);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const NUM_BARS=60;
    const beats=[0.8,0.6,0.4,0.7,1.0,0.5,0.9,0.3,0.8,0.6];
    function draw(){
      const W=canvas.width=canvas.offsetWidth;
      const H=canvas.height=canvas.offsetHeight;
      ctx.clearRect(0,0,W,H);
      const t=tRef.current;
      const barW=W/NUM_BARS;
      for(let i=0;i<NUM_BARS;i++){
        const beat=beats[i%beats.length];
        const h=(0.2+0.8*Math.abs(Math.sin(t*0.04+i*0.3))*beat)*H;
        const prog=i/NUM_BARS;
        const hue=Math.floor(300+prog*60);
        ctx.fillStyle=`hsla(${hue},100%,65%,${0.3+0.7*Math.abs(Math.sin(t*0.06+i*0.5))*0.5})`;
        ctx.fillRect(i*barW+1,H-h,barW-2,h);
      }
      tRef.current+=1;
      rafRef.current=requestAnimationFrame(draw);
    }
    draw();
    return()=>cancelAnimationFrame(rafRef.current);
  },[]);
  return <canvas ref={canvasRef} className="audio-viz" id="viz-canvas" style={{position:"absolute",bottom:0,left:0,right:0,height:80,zIndex:5,pointerEvents:"none",opacity:.4}}/>;
}

  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);

  const ref=useRef(null);

  useEffect(()=>{

/* ════════════════════════════════════════════
   SWIPE CARDS (Mobile Tinder-style)
════════════════════════════════════════════ */
function SwipeCards({events,onRegister}){
  const allCards=events;
  const [current,setCurrent]=useState(0);
  const [swiping,setSwiping]=useState(null); // {dir, dx, dy}
  const [animating,setAnimating]=useState(false);
  const startRef=useRef(null);

  const doSwipe=(dir)=>{
    if(animating||current>=allCards.length)return;
    setAnimating(true);
    setSwiping({dir,dx:dir==="right"?200:dir==="left"?-200:0,dy:dir==="up"?-200:0});
    if(dir==="up"&&onRegister)onRegister(allCards[current]);
    setTimeout(()=>{
      setCurrent(c=>c+1);
      setSwiping(null);
      setAnimating(false);
    },380);
  };

  const onPointerDown=(e)=>{
    if(animating)return;
    e.currentTarget.setPointerCapture(e.pointerId);
    startRef.current={x:e.clientX,y:e.clientY};
  };
  const onPointerMove=(e)=>{
    if(!startRef.current||animating)return;
    const dx=e.clientX-startRef.current.x;
    const dy=e.clientY-startRef.current.y;
    setSwiping({dir:null,dx,dy});
  };
  const onPointerUp=(e)=>{
    if(!startRef.current||animating){startRef.current=null;return;}
    const dx=e.clientX-startRef.current.x;
    const dy=e.clientY-startRef.current.y;
    startRef.current=null;
    if(Math.abs(dx)>75)doSwipe(dx>0?"right":"left");
    else if(dy<-75)doSwipe("up");
    else setSwiping(null);
  };

  const remaining=allCards.length-current;
  if(remaining<=0)return(
    <div style={{textAlign:"center",padding:"4rem 2rem",border:"1px solid rgba(255,255,255,.07)"}}>
      <div style={{fontSize:"3rem",marginBottom:"1rem"}}>🎉</div>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,color:"#f0ede6",marginBottom:".5rem"}}>All caught up!</div>
      <div style={{fontSize:".8rem",color:"#444",marginBottom:"1.5rem"}}>You've swiped through all events</div>
      <button className="hbtn solid" style={{fontSize:".78rem"}} onClick={()=>setCurrent(0)}>Start Over</button>
    </div>
  );

  const visible=allCards.slice(current,current+3).reverse();

  return(
    <div style={{userSelect:"none"}}>
      <div className="swipe-stack">
        {visible.map((ev,visIdx)=>{
          const stackPos=2-visIdx; // 2=top, 0=bottom
          const isTop=stackPos===2;
          const sw=isTop&&swiping?swiping:null;
          const dx=sw?sw.dx:0;
          const dy=sw?sw.dy:0;
          const rot=dx*0.06;
          const scale=0.93+stackPos*0.035;
          const translateY=stackPos===0?12:stackPos===1?6:0;
          const isDragging=isTop&&swiping&&!animating;
          let exitStyle={};
          if(isTop&&animating&&swiping){
            if(swiping.dir==="right")exitStyle={transform:`translateX(150%) rotate(20deg)`,opacity:0,transition:"transform .38s ease,opacity .3s"};
            else if(swiping.dir==="left")exitStyle={transform:`translateX(-150%) rotate(-20deg)`,opacity:0,transition:"transform .38s ease,opacity .3s"};
            else if(swiping.dir==="up")exitStyle={transform:`translateY(-130%) scale(0.85)`,opacity:0,transition:"transform .38s ease,opacity .3s"};
          }
          return(
            <div key={ev.id} className="swipe-card"
              style={{
                zIndex:stackPos+1,
                transform:isDragging
                  ?`translateX(${dx}px) translateY(${dy}px) rotate(${rot}deg)`
                  :`translateY(${translateY}px) scale(${scale})`,
                transition:isDragging?"none":"transform .3s ease",
                opacity:1,
                ...exitStyle,
              }}
              onPointerDown={isTop?onPointerDown:undefined}
              onPointerMove={isTop?onPointerMove:undefined}
              onPointerUp={isTop?onPointerUp:undefined}>
              <div style={{height:220,position:"relative"}}>
                <EventArt cat={ev.cat} seed={ev.id.charCodeAt(1)} w={400} h={220}/>
                <div className={`ev-badge ${CAT_BADGE[ev.cat]}`} style={{position:"absolute",top:".75rem",left:".75rem"}}>{ev.cat.toUpperCase()}</div>
                {ev.hot&&<div className="ev-hot" style={{right:".75rem",left:"auto"}}>🔥 HOT</div>}
              </div>
              <div style={{padding:"1.25rem"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:"1rem",color:"#f0ede6",marginBottom:".3rem",lineHeight:1.2}}>{ev.name}</div>
                <div style={{fontSize:".72rem",color:"#555",marginBottom:".6rem"}}>{ev.college}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:".78rem",fontWeight:700,color:CAT_COLORS[ev.cat]||"#00e5ff"}}>{ev.free?"Free Entry":ev.prize}</div>
                  <div style={{fontSize:".68rem",color:"#444"}}>{ev.date}</div>
                </div>
              </div>
              {/* Drag indicators */}
              {isTop&&dx>50&&<div style={{position:"absolute",inset:0,background:"rgba(57,255,20,0.08)",display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{background:"#39ff14",color:"#000",fontWeight:900,padding:".4rem 1rem",fontSize:".85rem",transform:"rotate(-8deg)",boxShadow:"0 4px 20px rgba(57,255,20,0.4)"}}>SAVE ❤️</div></div>}
              {isTop&&dx<-50&&<div style={{position:"absolute",inset:0,background:"rgba(255,68,68,0.08)",display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{background:"#ff4444",color:"#fff",fontWeight:900,padding:".4rem 1rem",fontSize:".85rem",transform:"rotate(8deg)",boxShadow:"0 4px 20px rgba(255,68,68,0.4)"}}>SKIP ✗</div></div>}
              {isTop&&dy<-50&&<div style={{position:"absolute",inset:0,background:"rgba(255,107,53,0.1)",display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{background:"#ff6b35",color:"#fff",fontWeight:900,padding:".4rem 1rem",fontSize:".85rem",boxShadow:"0 4px 20px rgba(255,107,53,0.4)"}}>REGISTER ⚡</div></div>}
            </div>
          );
        })}
      </div>
      {/* Counter */}
      <div style={{textAlign:"center",margin:".75rem 0",fontSize:".7rem",color:"#333",fontWeight:700,letterSpacing:".1em"}}>{remaining} EVENT{remaining!==1?"S":""} LEFT</div>
      <div className="swipe-hint">
        <div className="swipe-hint-btn" onClick={()=>doSwipe("left")}><div className="swipe-hint-icon" style={{borderColor:"rgba(255,68,68,0.6)",color:"rgba(255,68,68,0.8)"}}>✗</div>Skip</div>
        <div className="swipe-hint-btn" onClick={()=>doSwipe("up")}><div className="swipe-hint-icon" style={{borderColor:"rgba(255,107,53,0.8)",color:"rgba(255,107,53,0.95)"}}>⚡</div>Register</div>
        <div className="swipe-hint-btn" onClick={()=>doSwipe("right")}><div className="swipe-hint-icon" style={{borderColor:"rgba(57,255,20,0.6)",color:"rgba(57,255,20,0.8)"}}>❤</div>Save</div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   AI EVENT RECOMMENDER
════════════════════════════════════════════ */
function AIRecommender(){
  const [recs,setRecs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [loaded,setLoaded]=useState(false);

  const getRecommendations=async()=>{
    setLoading(true);
    const interests=JSON.parse(localStorage.getItem('cb_interests')||'[]');
    const myRegs=API.getMyRegs();
    const regCats=myRegs.map(r=>{const ev=db.getEvent(r.eventId);return ev&&ev.cat;}).filter(Boolean);
    const allCats=[...new Set([...interests.map(function(i){return i.toLowerCase();}), ...regCats])];
    const allEv=db.getAllEvents();
    var recs=[];
    if(allCats.length>0){
      allCats.forEach(function(cat){
        allEv.forEach(function(ev){
          if(ev.cat===cat && !myRegs.find(function(r){return r.eventId===ev.id;}) && !recs.find(function(r){return r.ev.id===ev.id;}))
            recs.push({ev:ev,reason:'Matches your '+cat+' interest'});
        });
      });
    }
    if(recs.length<3){
      allEv.filter(function(e){return e.hot;}).forEach(function(ev){
        if(recs.length<6 && !recs.find(function(r){return r.ev.id===ev.id;}))
          recs.push({ev:ev,reason:'Trending on CampusBuzz this week'});
      });
    }
    setRecs(recs.slice(0,3));
    setLoading(false);setLoaded(true);
  };

  return(
    <div className="ai-panel">
      <div className="ai-panel-title">🤖 AI Event Recommender <span style={{fontSize:".65rem",color:"#9b4dff",fontWeight:700,padding:".15rem .5rem",border:"1px solid rgba(155,77,255,.3)",background:"rgba(155,77,255,.1)"}}>BETA</span></div>
      <div className="ai-panel-sub">Personalized picks based on your registration history</div>
      {!loaded&&!loading&&<button onClick={getRecommendations} style={{background:"linear-gradient(135deg,#00e5ff,#a855f7)",color:"#000",padding:".75rem 2rem",fontWeight:800,fontSize:".82rem",letterSpacing:".08em",border:"none",cursor:"none",transition:"opacity .2s"}} onMouseEnter={e=>e.currentTarget.style.opacity=".85"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>✨ Get My Picks This Week</button>}
      {loading&&<div className="ai-loading"><div className="ai-loading-dots"><div className="ai-dot"/><div className="ai-dot"/><div className="ai-dot"/></div>Finding your perfect events...</div>}
      {loaded&&!loading&&recs.map(({ev,reason},i)=>(
        <div key={ev.id} className="ai-rec-card">
          <div className="ai-rec-art"><EventArt cat={ev.cat} seed={ev.id.charCodeAt(1)+50} w={112} h={112}/></div>
          <div>
            <div className="ai-rec-name">{ev.name}</div>
            <div className="ai-rec-reason">{reason}</div>
            <div className="ai-rec-tag">{ev.cat.toUpperCase()} · {ev.date}</div>
          </div>
        </div>
      ))}
      {loaded&&!loading&&<button onClick={()=>{setLoaded(false);setRecs([]);}} style={{marginTop:".75rem",fontSize:".7rem",fontWeight:700,color:"#555",background:"transparent",border:"1px solid rgba(255,255,255,.08)",padding:".4rem .9rem",cursor:"none"}}>🔄 Refresh Picks</button>}
    </div>
  );
}

/* ════════════════════════════════════════════
   SCROLL REVEAL HOOK
════════════════════════════════════════════ */
function useScrollReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll(".reveal");
    const obs=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("visible");});
    },{threshold:0.15});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
}

/* ════════════════════════════════════════════
   3D TILT CARD HOOK
════════════════════════════════════════════ */
function useTiltCard(ref){
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const onMove=(e)=>{
      const rect=el.getBoundingClientRect();
      const x=(e.clientX-rect.left)/rect.width-0.5;
      const y=(e.clientY-rect.top)/rect.height-0.5;
      el.style.transform=`perspective(600px) rotateY(${x*18}deg) rotateX(${-y*12}deg) translateY(-8px)`;
      const canvas=el.querySelector("canvas");
      if(canvas)canvas.style.transform=`translateX(${x*8}px) translateY(${y*5}px)`;
    };
    const onLeave=()=>{el.style.transform="";const canvas=el.querySelector("canvas");if(canvas)canvas.style.transform="";};
    el.addEventListener("mousemove",onMove);
    el.addEventListener("mouseleave",onLeave);
    return()=>{el.removeEventListener("mousemove",onMove);el.removeEventListener("mouseleave",onLeave);};
  },[]);
}

/* ═══════════════════════════════════════
   FEATURE 11: QR CODE CANVAS
═══════════════════════════════════════ */
function QRCanvas({value,sz=64}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const cv=ref.current,cx=cv.getContext('2d');
    const M=21,cell=Math.floor(sz/M);
    cx.fillStyle='#fff';cx.fillRect(0,0,sz,sz);
    cx.fillStyle='#111';
    let hash=0;for(let k=0;k<value.length;k++)hash=((hash<<5)-hash+value.charCodeAt(k))|0;
    for(let r=0;r<M;r++)for(let c=0;c<M;c++){
      if((r<7&&c<7)||(r<7&&c>M-8)||(r>M-8&&c<7))continue;
      if(((hash^(r*131+c*89+r*c*7))&3)===0)cx.fillRect(c*cell,r*cell,cell,cell);
    }
    [[0,0],[0,M-7],[M-7,0]].forEach(([tr,tc])=>{
      cx.fillStyle='#111';cx.fillRect(tc*cell,tr*cell,7*cell,7*cell);
      cx.fillStyle='#fff';cx.fillRect((tc+1)*cell,(tr+1)*cell,5*cell,5*cell);
      cx.fillStyle='#111';cx.fillRect((tc+2)*cell,(tr+2)*cell,3*cell,3*cell);
    });
  },[value,sz]);
  return <canvas ref={ref} width={sz} height={sz} style={{imageRendering:'pixelated',display:'block'}}/>;
}

  {n:'Christ Univ.',a:'Ghaziabad, Delhi NCR',x:.82,y:.32,col:'#06b6d4',ev:1,slug:'sustainathon-christ-2026'},
];
function DelhiMap({go}){
  const cvRef=useRef(null);
  const[hov,setHov]=useState(null);
  const[tip,setTip]=useState({x:0,y:0});
  const hovRef=useRef(null);hovRef.current=hov;
  const tRef=useRef(0),rafRef=useRef(null);
  useEffect(()=>{
    const cv=cvRef.current;if(!cv)return;
    const cx=cv.getContext('2d');
    let W=0,H=0;
    const resize=()=>{W=cv.offsetWidth;H=cv.offsetHeight;if(W&&H){cv.width=W;cv.height=H;}};
    resize();window.addEventListener('resize',resize);
    function draw(){
      tRef.current++;const t=tRef.current;const hh=hovRef.current;
      W=cv.offsetWidth;H=cv.offsetHeight;
      if(!W||!H){rafRef.current=requestAnimationFrame(draw);return;}
      cv.width=W;cv.height=H;
      // BG
      const bg=cx.createLinearGradient(0,0,W,H);
      bg.addColorStop(0,'#03030d');bg.addColorStop(1,'#07071a');
      cx.fillStyle=bg;cx.fillRect(0,0,W,H);
      // Grid
      cx.strokeStyle='rgba(0,229,255,.04)';cx.lineWidth=1;
      for(let x=0;x<W;x+=40){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
      for(let y=0;y<H;y+=40){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
      // NCR outline
      const b=[.1,.04,.66,.03,.88,.3,.84,.78,.54,.94,.13,.85,.03,.51,.08,.22];
      cx.beginPath();for(let i=0;i<b.length;i+=2)i===0?cx.moveTo(b[i]*W,b[i+1]*H):cx.lineTo(b[i]*W,b[i+1]*H);
      cx.closePath();cx.strokeStyle='rgba(0,229,255,.2)';cx.lineWidth=1.5;cx.stroke();
      cx.fillStyle='rgba(0,229,255,.022)';cx.fill();
      // Region labels
      cx.font='bold 9px Outfit';cx.textAlign='center';cx.fillStyle='rgba(0,229,255,.2)';
      [['DELHI',.41,.46],['NOIDA',.8,.5],['GURGAON',.32,.76],['FARIDABAD',.61,.8],['GHAZBD',.74,.27],['HARYANA',.3,.09]]
        .forEach(([lb,px,py])=>cx.fillText(lb,px*W,py*H));
      // Ring road
      cx.strokeStyle='rgba(255,107,53,.07)';cx.lineWidth=1;cx.setLineDash([3,5]);
      cx.beginPath();cx.arc(.41*W,.47*H,Math.min(W,H)*.23,0,Math.PI*2);cx.stroke();cx.setLineDash([]);
      // Connector lines
      [[0,2],[1,4],[2,3],[6,0],[7,8]].forEach(([a2,b2])=>{
        const pa=MAP_PINS[a2],pb2=MAP_PINS[b2];
        cx.strokeStyle='rgba(255,255,255,.05)';cx.lineWidth=1;cx.setLineDash([2,5]);
        cx.beginPath();cx.moveTo(pa.x*W,pa.y*H);cx.lineTo(pb2.x*W,pb2.y*H);cx.stroke();cx.setLineDash([]);
      });
      // Pins
      MAP_PINS.forEach((pin,ci)=>{
        const px=pin.x*W,py=pin.y*H,isH=hh&&hh.n===pin.n;
        const pulse=1+Math.sin(t*.055+ci*.88)*.28;
        cx.globalAlpha=isH?.55:.16;cx.strokeStyle=pin.col;cx.lineWidth=1.5;
        cx.beginPath();cx.arc(px,py,(14+ci%4*2)*pulse,0,Math.PI*2);cx.stroke();
        const gr=cx.createRadialGradient(px,py,0,px,py,isH?24:14);
        gr.addColorStop(0,pin.col+'88');gr.addColorStop(1,'transparent');
        cx.globalAlpha=isH?.55:.22;cx.fillStyle=gr;
        cx.beginPath();cx.arc(px,py,isH?24:14,0,Math.PI*2);cx.fill();
        cx.globalAlpha=1;
        cx.fillStyle=isH?'#fff':pin.col;cx.beginPath();cx.arc(px,py,isH?7:5,0,Math.PI*2);cx.fill();
        // Event count badge
        cx.fillStyle=pin.col;cx.beginPath();cx.arc(px+8,py-8,6,0,Math.PI*2);cx.fill();
        cx.fillStyle='#000';cx.font='bold 7px Outfit';cx.textAlign='center';cx.fillText(pin.ev,px+8,py-5.5);
        // Name
        cx.fillStyle=isH?'#fff':'rgba(240,237,230,.6)';
        cx.font=isH?'bold 10px Syne':'9px Outfit';cx.textAlign='center';
        cx.fillText(pin.n,px,py-15);
      });
      cx.textAlign='left';cx.fillStyle='rgba(0,229,255,.2)';cx.font='9px Outfit';
      cx.fillText('Hover a college to preview · '+MAP_PINS.length+' colleges across Delhi NCR',10,H-10);
      rafRef.current=requestAnimationFrame(draw);
    }
    draw();
    const onM=e=>{
      const r=cv.getBoundingClientRect();
      const mx=(e.clientX-r.left)/r.width,my=(e.clientY-r.top)/r.height;
      setHov(MAP_PINS.find(p=>Math.sqrt((p.x-mx)**2+(p.y-my)**2)<.05)||null);
      setTip({x:e.clientX-r.left,y:e.clientY-r.top});
    };
    cv.addEventListener('mousemove',onM);cv.addEventListener('mouseleave',()=>setHov(null));
    return()=>{cancelAnimationFrame(rafRef.current);cv.removeEventListener('mousemove',onM);window.removeEventListener('resize',resize);};
  },[]);
  const tipLeft=tip.x>350?tip.x-210:tip.x+14;
  const tipTop=Math.max(8,tip.y-90);
  return(
    <div className="map-box" style={{height:480}}>
      <canvas ref={cvRef} style={{width:'100%',height:'100%'}}/>
      {hov&&(
        <div className="map-tooltip" style={{left:tipLeft,top:tipTop}}>
          <div className="map-tip-name">{hov.n}</div>
          <div className="map-tip-area" style={{color:hov.col}}>{hov.a}</div>

        </div>
      )}

  );
}

function WishHeart({evId}){
  const{wish,toggle}=useWish();
  const on=wish.has(evId);
  return(
    <button className={`heart-btn${on?' h-on':''}`}
      onClick={e=>{e.stopPropagation();toggle(evId);}} title={on?'Saved':'Save to wishlist'}>
      {on?'♥':'♡'}
    </button>
  );
}

function EvCard({ev,idx,onClick}){
  const color=CAT_COLORS[ev.cat]||"#00e5ff";
  const seed=ev.id.charCodeAt(1)+idx;
  const cardRef=useRef(null);
  useTiltCard(cardRef);
  return(
    <div ref={cardRef} className="ev-card reveal" style={{animationDelay:idx*.07+"s",cursor:"none",transformStyle:"preserve-3d"}}
      onClick={()=>onClick(ev)}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=color+"66";e.currentTarget.style.boxShadow=`0 30px 80px rgba(0,0,0,.6), 0 0 40px ${color}15`;}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.08)";e.currentTarget.style.boxShadow="none";}}>
      <div className="ev-art">
        <EventArt cat={ev.cat} seed={seed}/>
        <div className={`ev-badge ${CAT_BADGE[ev.cat]}`}>{ev.cat.toUpperCase()}</div>
        {ev.hot&&<div className="ev-hot">🔥 HOT</div>}

════════════════════════════════════════════ */
function Modal({ev,onClose}){
  const toast=useToast();
  const {refresh}=useApp();
  const cd=useCD(ev.deadline);
  const color=CAT_COLORS[ev.cat]||"#00e5ff";
  const seed=ev.id.charCodeAt(1);
  const[open,setOpen]=useState(false);
  const[f,setF]=useState({name:"",email:"",phone:"",college:""});
  const[loading,setLoading]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const reg=async()=>{
    if(!f.name||!f.email||!f.phone){toast("Fill all required fields","err");return;}
    setLoading(true);const r=await API.register(ev.id,f);setLoading(false);
    if(r.ok){toast(r.msg,"ok");refresh&&refresh();onClose();}else toast(r.msg,"err");
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-art"><EventArt cat={ev.cat} seed={seed} w={700} h={260}/></div>
        <div style={{position:"absolute",top:220,left:"1rem"}}>
          <div className={`ev-badge ${CAT_BADGE[ev.cat]}`} style={{position:"static",display:"inline-block"}}>{ev.cat.toUpperCase()}</div>
        </div>
        <div className="modal-body">
          <div className="tag-row">{ev.tags.map(t=><span key={t} className="tag">{t}</span>)}</div>
          <div className="modal-title">{ev.name}</div>
          <div className="modal-cd">
            {[["DAYS",cd.d],["HRS",cd.h],["MIN",cd.m],["SEC",cd.s]].map(([l,v])=>(
              <div key={l}><div className="mcd-n" style={{color}}>{String(v).padStart(2,"0")}</div><div className="mcd-l">{l}</div></div>
            ))}
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontSize:".6rem",color:"#333",letterSpacing:".15em",textTransform:"uppercase"}}>Deadline</div>
              <div style={{color:"#f0ede6",fontWeight:700,fontSize:".88rem"}}>{new Date(ev.deadline).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div>
            </div>
          </div>
          <div className="info-grid">
            {[["📍 Venue",ev.venue],["📅 Date & Time",`${ev.date} · ${ev.time}`],["🏆 Prize",ev.free?"Free Entry":ev.prize],["👥 Registered",`${ev.registrations.toLocaleString()} students`]].map(([k,v])=>(
              <div key={k} className="info-box"><div className="info-box-l">{k}</div><div className="info-box-v">{v}</div></div>
            ))}
          </div>
          <p className="modal-desc">{ev.description}</p>
          <div className="reg-area">
            {!open
              ?<button className="reg-btn reg-open-btn" onClick={()=>setOpen(true)}>GET PASSES — REGISTER NOW →</button>
              :<>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",color:"#f0ede6",marginBottom:"1rem"}}>Complete Your Registration</div>
                <div className="reg-grid">
                  {[["Full Name *","text","Your name","name"],["Email *","email","your@email.com","email"],["Phone *","tel","+91 99999 00000","phone"],["College","text","College name","college"]].map(([l,t,p,k])=>(
                    <div key={k}><label style={{fontSize:".65rem",fontWeight:800,letterSpacing:".18em",textTransform:"uppercase",color:"#444",display:"block",marginBottom:".35rem"}}>{l}</label><input className="reg-input" type={t} placeholder={p} value={f[k]} onChange={e=>set(k,e.target.value)}/></div>
                  ))}
                </div>
                <button className="reg-btn" disabled={loading} onClick={reg} style={{background:color,color:ev.cat==="dance"||ev.cat==="tech"?"#0a0a0a":"#fff",border:"none"}}>
                  {loading?"REGISTERING...":"CONFIRM REGISTRATION ✓"}
                </button>
              </>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function QuickDateFilter({dateFilter,setDateFilter}){
  const chips=[
    {id:'all',l:'ALL DATES'},
    {id:'today',l:'TODAY'},
    {id:'week',l:'THIS WEEK'},
    {id:'weekend',l:'WEEKEND'},
    {id:'month',l:'THIS MONTH'},
  ];
  return(
    <div className="date-filter">
      {chips.map(c=>(
        <button key={c.id} className={`df-chip${dateFilter===c.id?' df-on':''}`} onClick={()=>setDateFilter(c.id)}>{c.l}</button>
      ))}
    </div>
  );
}

function EventsPage(){
  const [filter,setFilter]=useState("all");
  const [dateFilter,setDateFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [page,setPage]=useState(1);
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const load=useCallback(async()=>{setLoading(true);const r=await API.query({cat:filter,search,page,limit:27});setData(r);setLoading(false);},[filter,search,page]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{setPage(1);},[filter,search]);
  const cats=[{id:"all",l:"ALL"},{id:"concert",l:"CONCERT"},{id:"dance",l:"DANCE"},{id:"literary",l:"LITERARY"},{id:"mun",l:"MUN"},{id:"fest",l:"FEST"},{id:"tech",l:"TECH"},{id:"poetry",l:"POETRY"},{id:"music",l:"MUSIC"}];
  return(
    <div style={{paddingTop:"5rem",minHeight:"100vh",position:"relative",zIndex:2}}>
      <div className="sec">
        <div style={{marginBottom:"2.5rem"}}>
          <div style={{fontSize:".65rem",fontWeight:800,letterSpacing:".4em",textTransform:"uppercase",color:"#00e5ff",marginBottom:".5rem"}}>Browse</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(2.5rem,7vw,5rem)",lineHeight:1,color:"#f0ede6"}}>ALL EVENTS <span style={{color:"#00e5ff"}}>DELHI NCR</span></div>
        </div>
        <SmartSearch onSelectEvent={ev=>{setSel(ev);setSearch("");}}/>
        {/* FEATURE 3: Quick date filter */}
        <QuickDateFilter dateFilter={dateFilter} setDateFilter={setDateFilter}/>
        <div className="filters">
          {cats.map(c=><button key={c.id} className={`fchip ${filter===c.id?"on":""}`} data-c={c.id} onClick={()=>setFilter(c.id)}>{c.l}</button>)}
        </div>
        {data&&<div style={{fontSize:".75rem",fontWeight:700,color:"#333",letterSpacing:".1em",marginBottom:"1.5rem"}}>{data.total} EVENTS FOUND</div>}
        <div className="ev-grid">
          {loading?Array.from({length:9}).map((_,i)=><div key={i} className="sk" style={{height:380,animationDelay:i*.06+"s"}}/>):
           (()=>{
             const now=new Date();const wd=now.getDay();
             const filtered=(data?.events||[]).filter(ev=>{
               if(dateFilter==='all')return true;
               const d=new Date(ev.deadline);
               if(dateFilter==='today'){const t=new Date();return d.toDateString()===t.toDateString();}
               if(dateFilter==='week'){const wk=new Date(now);wk.setDate(now.getDate()+7);return d>=now&&d<=wk;}
               if(dateFilter==='weekend'){const sat=new Date(now);sat.setDate(now.getDate()+(6-wd));const sun=new Date(sat);sun.setDate(sat.getDate()+1);return (d>=sat&&d<=sun)||d.getDay()===6||d.getDay()===0;}
               if(dateFilter==='month'){return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
               return true;
             });
             if(filtered.length===0)return(
               <div style={{gridColumn:"1/-1",textAlign:"center",padding:"6rem 0",color:"rgba(240,237,230,.3)"}}>
                 <div style={{fontSize:"4rem",marginBottom:"1rem"}}>🔍</div>
                 <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1.3rem",color:"#f0ede6",marginBottom:".5rem"}}>No events found</div>
                 <div>Try a different filter or search term</div>
               </div>
             );
             return filtered.map((ev,i)=><EvCard key={ev.id} ev={ev} idx={i} onClick={setSel}/>);
           })()}
        </div>
        {data&&data.pages>1&&(
          <div style={{display:"flex",gap:".5rem",justifyContent:"center",marginTop:"3rem"}}>
            {Array.from({length:data.pages}).map((_,i)=>(
              <button key={i} onClick={()=>setPage(i+1)} style={{width:38,height:38,background:page===i+1?"#ff6b35":"transparent",color:page===i+1?"#fff":"rgba(240,237,230,.4)",border:"1px solid "+(page===i+1?"#ff6b35":"rgba(255,255,255,.1)"),fontWeight:800,cursor:"none",transition:"all .2s"}}>{i+1}</button>
            ))}
          </div>
        )}
      </div>
      {sel&&<Modal ev={sel} onClose={()=>setSel(null)}/>}
    </div>
  );
}

  return(

      <div className="cd-name">{ev.name}</div>
      <div className="cd-college">{ev.college}</div>

/* ════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════ */
function App(){
  const [page,setPage]=useState("home");
  const [toasts,setToasts]=useState([]);
  const [,forceRefresh]=useState(0);

  useEffect(()=>{
    const cleanup=initGlobalBg();
    return cleanup;
  },[]);

  const toast=useCallback((msg,type="ok")=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500);
  },[]);

  const go=useCallback(p=>{setPage(p);window.scrollTo({top:0,behavior:"smooth"});},[]);
  const refresh=useCallback(()=>forceRefresh(n=>n+1),[]);

  const render=()=>{
    switch(page){
      case "home":    return <HomePage go={go}/>;
      case "events":  return <EventsPage/>;
      case "trending":return <TrendingPage/>;
      case "submit":  return <SubmitPage/>;
      case "profile": return <ProfilePage/>;
      case "myregs":  return <MyRegsPage go={go}/>;
      default:        return <HomePage go={go}/>;
    }
  };

  return(
    <WishProvider>
      <Ctx.Provider value={{toast,refresh}}>
        <Cursor/>
        <ThemeSwitcher/>
        <Nav page={page} go={go}/>
        <LiveBar/>
        <main style={{position:"relative",zIndex:1}}>{render()}</main>
        <Footer go={go}/>
        <Toasts list={toasts}/>
        <BackToTop/>
      </Ctx.Provider>
    </WishProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

const m=document.getElementById('auth-modal');m.style.display='none';m.style.visibility='hidden';if(!localStorage.getItem('cb_interests')){setTimeout(function(){document.getElementById('interest-modal').style.display='flex';},300);}else{location.reload();}

function saveInterests(){
  const chips=document.querySelectorAll('#interest-chips div');
  const selected=Array.from(chips).filter(c=>c.getAttribute('data-sel')==='1').map(c=>c.textContent.split(' ').slice(1).join(' '));
  localStorage.setItem('cb_interests',JSON.stringify(selected));
  document.getElementById('interest-modal').style.display='none';
  location.reload();
}
function showInterestModal(){
  const m=document.getElementById('interest-modal');
  m.style.display='flex';
}
</script></body>
</html>
