<!DOCTYPE html>
<script>const CAT_COLORS={"fest":"#ff6b35","concert":"#a855f7","dance":"#ec4899","literary":"#3b82f6","mun":"#10b981","tech":"#06b6d4","poetry":"#f59e0b","music":"#ef4444","default":"#00e5ff"};const CAT_BADGE={"fest":"🎪","concert":"🎵","dance":"💃","literary":"📚","mun":"🌍","tech":"💻","poetry":"✍️","music":"🎸","default":"🎯"};</script>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusBuzz — Delhi NCR College Events</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ── CSS COLOR VARIABLES ── */
:root{
  --accent:#00e5ff;     /* cyan — primary accent */
  --accent2:#f5ff00;    /* yellow — secondary */
  --accent3:#ff6b35;    /* orange — tertiary */
  --accent4:#a855f7;    /* purple — quaternary */
  --accent5:#39ff14;    /* green — success/tech */
  --hot:#ff3d3d;        /* red — hot/urgent */
  --brand:#ff2d9b;      /* pink — brand only (logo, marquee) */
  --bg:#06060f;
  --bg2:#0a0a18;
  --surface:rgba(255,255,255,.03);
  --border:rgba(255,255,255,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:#f0ede6;font-family:'Outfit',sans-serif;overflow-x:hidden;cursor:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent)}
input,textarea,select,button{font-family:'Outfit',sans-serif}button,a{cursor:none}

/* ── GLOBAL BG CANVAS ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}

/* ── CURSOR ── */
.cur{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform .1s}
.cur-ring{width:36px;height:36px;border:1.5px solid rgba(0,229,255,.6);border-radius:50%;position:fixed;pointer-events:none;z-index:99998;transform:translate(-50%,-50%)}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes barDance{0%,100%{height:8px}50%{height:32px}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(0,229,255,.3)}50%{box-shadow:0 0 30px rgba(0,229,255,.7),0 0 60px rgba(0,229,255,.3)}}

.fu{animation:fadeUp .6s ease both}
.fi{animation:fadeIn .4s ease both}
.sk{position:relative;overflow:hidden;background:rgba(255,255,255,.04);border-radius:4px}
.sk::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shimmer 1.6s infinite}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:600;backdrop-filter:blur(24px);background:rgba(6,6,15,.88);border-bottom:1px solid rgba(0,229,255,.15);padding:.9rem 2rem;display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;color:#f0ede6;cursor:none}
.nav-logo span{color:var(--brand)}
.nav-center{display:flex;align-items:center;gap:2rem}
.nav-link{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,237,230,.5);text-decoration:none;transition:color .2s;cursor:none}
.nav-link:hover,.nav-link.active{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.nav-cta{background:var(--accent3);color:#fff;padding:.55rem 1.3rem;font-weight:800;font-size:.75rem;letter-spacing:.08em;border:none;transition:all .2s}
.nav-cta:hover{background:#e05520}

/* ── PROFILE BUTTON ── */
.profile-btn{position:relative;display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.06);border:1px solid rgba(0,229,255,.2);padding:.5rem 1rem;transition:all .2s;cursor:none}
.profile-btn:hover{border-color:var(--accent);background:rgba(0,229,255,.08)}
.profile-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent4));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#fff;flex-shrink:0}
.profile-name{font-size:.75rem;font-weight:700;color:#f0ede6}
.profile-chevron{font-size:.6rem;color:#666;transition:transform .2s}
.profile-btn.open .profile-chevron{transform:rotate(180deg)}

/* ── DROPDOWN ── */
.dropdown{position:absolute;top:calc(100% + .75rem);right:0;background:#0a0a1e;border:1px solid rgba(0,229,255,.2);min-width:300px;z-index:700;animation:slideDown .2s ease}
.dropdown::before{content:'';position:absolute;top:-6px;right:1.5rem;width:10px;height:10px;background:#0a0a1e;border-left:1px solid rgba(0,229,255,.2);border-top:1px solid rgba(0,229,255,.2);transform:rotate(45deg)}
.dd-header{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:1rem}
.dd-avatar-lg{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent4));display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;flex-shrink:0;animation:glow 2s ease-in-out infinite}
.dd-info-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#f0ede6}
.dd-info-email{font-size:.72rem;color:#555;margin-top:.15rem}
.dd-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.04);margin:0;padding:0}
.dd-stat{padding:.9rem 1.5rem;text-align:center}
.dd-stat-n{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);line-height:1}
.dd-stat-l{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#444;margin-top:.1rem}
.dd-section-title{font-size:.6rem;font-weight:800;letter-spacing:.25em;text-transform:uppercase;color:#333;padding:.9rem 1.5rem .4rem}
.dd-reg-item{padding:.75rem 1.5rem;display:flex;align-items:center;gap:.85rem;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;cursor:none}
.dd-reg-item:hover{background:rgba(255,255,255,.03)}
.dd-reg-emoji{font-size:1.3rem;flex-shrink:0}
.dd-reg-name{font-size:.78rem;font-weight:700;color:#f0ede6;margin-bottom:.15rem}
.dd-reg-college{font-size:.65rem;color:#444}
.dd-reg-date{font-size:.62rem;color:var(--accent3);font-weight:700;margin-left:auto;flex-shrink:0}
.dd-empty{padding:1.5rem;text-align:center;color:#333;font-size:.8rem}
.dd-footer{padding:.85rem 1.5rem;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:.75rem}
.dd-footer-btn{flex:1;padding:.55rem;font-size:.72rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;text-align:center;border:1px solid;transition:all .2s;cursor:none}
.dd-footer-btn.ghost{border-color:rgba(255,255,255,.1);color:#555;background:transparent}
.dd-footer-btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.dd-footer-btn.danger{border-color:rgba(255,80,80,.3);color:rgba(255,80,80,.6);background:transparent}
.dd-footer-btn.danger:hover{border-color:#ff4444;color:#ff4444}

/* ── MARQUEE ── */
.mq{background:linear-gradient(90deg,#0a0a20,#120820,#0a0a20);padding:.8rem 0;overflow:hidden;border-top:1px solid rgba(0,229,255,.2);border-bottom:1px solid rgba(0,229,255,.2)}
.mq-track{display:inline-flex;gap:2.5rem;white-space:nowrap;animation:marquee 24s linear infinite}
.mq-item{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;color:#f0ede6;letter-spacing:.12em;display:flex;align-items:center;gap:1.5rem}
.mq-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;flex-shrink:0}

/* ── HERO ── */
.hero{height:100vh;min-height:600px;display:flex;flex-direction:row;align-items:flex-start;justify-content:flex-start;text-align:left;padding:0;position:relative;overflow:hidden}
.hero-content{position:relative;z-index:10;padding-top:5.5rem;display:flex;flex-direction:column;align-items:flex-start;width:100%;max-width:46%;padding-left:4rem;pointer-events:none;text-align:left}
.hero-content button,.hero-content a{pointer-events:auto}
/* Hero bottom overlay — categories + CTA centered below crowd */
.hero-bottom{position:absolute;bottom:0;left:0;right:0;z-index:20;pointer-events:none}
.hero-bottom button,.hero-bottom a{pointer-events:auto}
.hero-cats-bar{background:linear-gradient(to top,rgba(6,6,15,0.98) 0%,rgba(6,6,15,0.92) 70%,transparent 100%);padding:2.5rem 2rem 1.8rem;display:flex;flex-direction:column;align-items:center;gap:1.4rem}
.hero-tag-row{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;max-width:860px}
.hero-tag{display:inline-flex;align-items:center;gap:.4rem;padding:.38rem .9rem;border:1px solid;font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;transition:all .2s;backdrop-filter:blur(8px);background:rgba(6,6,15,0.55)}
.hero-tag:hover{transform:translateY(-2px);filter:brightness(1.2)}
.hero-cta-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.hero-badge{display:inline-flex;align-items:center;gap:.6rem;background:rgba(6,6,15,0.6);border:1px solid rgba(0,229,255,.4);color:var(--accent);font-size:.68rem;font-weight:800;letter-spacing:.3em;text-transform:uppercase;padding:.4rem 1.2rem;margin-bottom:1.5rem;backdrop-filter:blur(8px)}
.hero-live{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,11vw,10rem);line-height:.85;letter-spacing:-.01em;color:#f0ede6;margin-bottom:1rem}
.hero-title .pink{color:var(--brand);display:block}
.hero-title .outline{-webkit-text-stroke:2px rgba(240,237,230,.3);color:transparent;display:block}
.hero-sub{font-size:.9rem;color:rgba(240,237,230,.6);letter-spacing:.04em;margin-bottom:1.5rem;background:rgba(6,6,15,0.5);padding:.5rem .9rem;backdrop-filter:blur(4px);line-height:1.6}
.hero-sub em{color:var(--accent);font-style:normal;font-weight:700}
.hbtns{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0}
.hbtn{padding:.85rem 2.2rem;font-weight:800;font-size:.88rem;letter-spacing:.06em;border:2px solid;transition:all .22s}
.hbtn.solid{background:var(--accent3);border-color:var(--accent3);color:#fff}
.hbtn.solid:hover{background:transparent;color:var(--accent3)}
.hbtn.ghost{background:rgba(6,6,15,0.5);border-color:rgba(0,229,255,.3);color:rgba(240,237,230,.8);backdrop-filter:blur(4px)}
.hbtn.ghost:hover{border-color:var(--accent);color:var(--accent)}
/* Stats bar BELOW hero */
.hero-stats-bar{position:relative;z-index:20;background:rgba(6,6,15,0.97);border-top:2px solid var(--accent);border-bottom:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(20px)}
.hstats{display:flex;overflow:hidden;max-width:1400px;margin:0 auto}
.hstat{padding:1.4rem 2rem;text-align:center;border-right:1px solid rgba(255,255,255,.06);flex:1;position:relative}
.hstat:last-child{border-right:none}
.hstat::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--accent);transition:width .4s}
.hstat:hover::before{width:80%}
.hstat-n{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1;background:linear-gradient(135deg,#f5ff00,#00e5ff 50%,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hstat-l{font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(240,237,230,.3);margin-top:.2rem}

/* ── MUSIC BARS ── */
.music-bars{display:flex;align-items:flex-end;gap:4px;height:32px}
.music-bar{width:4px;background:linear-gradient(to top,var(--accent3),var(--accent2));border-radius:2px;animation:barDance ease-in-out infinite}

/* ── SECTION ── */
.sec{padding:5rem 2rem;max-width:1400px;margin:0 auto;position:relative;z-index:2}
.sec-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.3),rgba(168,85,247,.25),rgba(0,229,255,.3),transparent);margin:0}
.sec-hd{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.5rem);letter-spacing:.02em;color:#f0ede6;line-height:1}
.sec-title .pink{color:var(--accent)}
.sec-link{font-size:.72rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,237,230,.4);transition:color .2s;border-bottom:1px solid rgba(240,237,230,.15);padding-bottom:.15rem}
.sec-link:hover{color:var(--accent);border-color:var(--accent)}

/* ── FILTERS ── */
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2rem}
.fchip{padding:.5rem 1.2rem;font-size:.73rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(240,237,230,.4);transition:all .18s}
.fchip:hover,.fchip.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.07)}
.fchip[data-c="dance"].on{border-color:var(--accent2);color:var(--accent2);background:rgba(245,255,0,.07)}
.fchip[data-c="literary"].on,.fchip[data-c="mun"].on{border-color:#00aaff;color:#00aaff;background:rgba(0,170,255,.07)}
.fchip[data-c="tech"].on{border-color:var(--accent5);color:var(--accent5);background:rgba(57,255,20,.07)}
.fchip[data-c="fest"].on{border-color:var(--accent3);color:var(--accent3);background:rgba(255,107,53,.07)}
.fchip[data-c="poetry"].on,.fchip[data-c="music"].on{border-color:var(--accent4);color:var(--accent4);background:rgba(168,85,247,.07)}

/* ── SEARCH ── */
.search-bar{position:relative;max-width:500px;margin-bottom:2rem}
.search-bar input{width:100%;padding:.85rem 1.2rem .85rem 3rem;font-size:.85rem;font-weight:600;letter-spacing:.04em;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#f0ede6;outline:none;transition:border-color .2s;backdrop-filter:blur(8px)}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:rgba(240,237,230,.2)}
.s-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:.9rem;color:rgba(240,237,230,.25);pointer-events:none}

/* ── EVENT CARDS ── */
.ev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem}
.ev-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);overflow:hidden;transition:transform .28s,border-color .28s,box-shadow .28s;animation:fadeUp .5s ease both;position:relative;backdrop-filter:blur(4px)}
.ev-card:hover{transform:translateY(-8px);box-shadow:0 32px 80px rgba(0,0,0,.5)}
.ev-art{position:relative;height:220px;overflow:hidden}
.ev-art canvas{width:100%;height:100%;display:block}
.ev-badge{position:absolute;top:.9rem;right:.9rem;font-size:.6rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;padding:.3rem .8rem;z-index:5}
.ev-hot{position:absolute;top:.9rem;left:.9rem;background:var(--hot);color:#fff;font-size:.58rem;font-weight:900;letter-spacing:.1em;padding:.28rem .65rem;z-index:5;display:flex;align-items:center;gap:.3rem;animation:pulse 1.5s ease-in-out infinite}
.ev-regs{position:absolute;bottom:.9rem;left:.9rem;background:rgba(0,0,0,.7);color:#fff;font-size:.63rem;font-weight:700;padding:.28rem .7rem;backdrop-filter:blur(6px);z-index:5}
.ev-body{padding:1.3rem}
.ev-name{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:900;line-height:1.2;text-transform:uppercase;margin-bottom:.8rem;color:#f0ede6}
.ev-info-row{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:rgba(240,237,230,.45);margin-bottom:.35rem;font-weight:500}
.ev-footer{margin-top:1.2rem;border-top:1px solid rgba(255,255,255,.07);padding-top:1.2rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.ev-prize small{font-size:.58rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,237,230,.3);display:block;margin-bottom:.1rem}
.ev-prize-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1}
.get-passes{display:flex;align-items:center;gap:.6rem;background:var(--accent3);color:#fff;padding:.7rem 1.3rem;font-weight:800;font-size:.73rem;letter-spacing:.1em;text-transform:uppercase;border:none;transition:all .2s;white-space:nowrap}
.get-passes:hover{background:#e05520}

/* Badge colors */
.bc-concert{background:#ff2d9b;color:#fff}
.bc-music{background:var(--accent4);color:#fff}
.bc-poetry{background:var(--accent4);color:#fff}
.bc-dance{background:var(--accent2);color:#0a0a0a}
.bc-literary,.bc-mun{background:#00aaff;color:#0a0a0a}
.bc-fest{background:var(--accent3);color:#fff}
.bc-tech{background:var(--accent5);color:#0a0a0a}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(16px);z-index:99000;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .2s ease}
.modal{background:#080818;border:1px solid rgba(0,229,255,.2);max-width:700px;width:100%;max-height:92vh;overflow-y:auto;animation:fadeUp .3s ease;position:relative}
.modal::-webkit-scrollbar{width:2px}
.modal::-webkit-scrollbar-thumb{background:var(--accent)}
.modal-art{height:260px;position:relative;overflow:hidden}
.modal-art canvas{width:100%;height:100%}
.modal-close{position:absolute;top:.9rem;right:.9rem;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);color:#f0ede6;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:.9rem;z-index:10;cursor:none;transition:background .2s}
.modal-close:hover{background:var(--accent3);border-color:var(--accent3)}
.modal-body{padding:2rem}
.modal-title{font-family:'Syne',sans-serif;font-weight:900;font-size:1.7rem;text-transform:uppercase;line-height:1.1;margin-bottom:1.5rem;color:#f0ede6}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.info-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:1rem}
.info-box-l{font-size:.6rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,237,230,.3);margin-bottom:.3rem}
.info-box-v{font-size:.88rem;font-weight:700;color:#f0ede6}
.modal-cd{background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.12);padding:1.2rem 1.5rem;display:flex;gap:2rem;margin-bottom:1.5rem;align-items:center;flex-wrap:wrap}
.mcd-n{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1;color:var(--accent)}
.mcd-l{font-size:.5rem;letter-spacing:.25em;text-transform:uppercase;color:#444}
.modal-desc{font-size:.88rem;color:rgba(240,237,230,.5);line-height:1.75;margin-bottom:1.5rem}
.tag-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.5rem}
.tag{font-size:.65rem;font-weight:700;letter-spacing:.08em;padding:.28rem .75rem;border:1px solid rgba(255,255,255,.12);color:rgba(240,237,230,.5)}
.reg-area{border-top:1px solid rgba(255,255,255,.07);padding-top:1.5rem}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1.2rem 0}
.reg-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:.75rem 1rem;font-size:.88rem;color:#f0ede6;outline:none;width:100%;transition:border-color .2s}
.reg-input:focus{border-color:var(--accent)}
.reg-input::placeholder{color:rgba(240,237,230,.2)}
.reg-btn{width:100%;background:var(--accent3);color:#fff;padding:1rem;font-family:'Syne',sans-serif;font-weight:900;font-size:.95rem;letter-spacing:.05em;border:none;transition:all .2s}
.reg-btn:hover:not(:disabled){background:#e05520}
.reg-btn:disabled{opacity:.5}
.reg-open-btn{background:transparent;border:2px solid var(--accent);color:var(--accent);margin-bottom:0}
.reg-open-btn:hover{background:var(--accent);color:#000}

/* ── COUNTDOWN ── */
.cd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.05);margin-top:2rem}
.cd-card{background:#080818;padding:1.6rem;transition:background .2s;cursor:none}
.cd-card:hover{background:#0d0d22}
.cd-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:#f0ede6;margin-bottom:.3rem}
.cd-college{font-size:.72rem;color:#444;margin-bottom:1.2rem}
.cd-timer{display:flex;gap:1.5rem}
.cd-n{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;line-height:1;color:var(--accent2)}
.cd-l{font-size:.5rem;letter-spacing:.25em;text-transform:uppercase;color:#333;margin-top:.15rem}
.cd-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.05)}
.cd-prize{font-size:.82rem;font-weight:700;color:#f0ede6}
.cd-rbtn{font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);padding:.3rem .8rem;border:1px solid rgba(0,229,255,.3);background:transparent;transition:all .2s}
.cd-rbtn:hover{background:var(--accent);color:#000}

/* ── TRENDING ── */
.trend-row{display:flex;gap:1.25rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:none;margin-top:2rem}
.trend-row::-webkit-scrollbar{display:none}
.trend-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);min-width:270px;flex-shrink:0;transition:all .22s;cursor:none;overflow:hidden}
.trend-card:hover{transform:translateY(-4px);border-color:rgba(0,229,255,.35)}
.trend-art{height:140px;position:relative}
.trend-art canvas{width:100%;height:100%}
.trend-rank{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:rgba(255,255,255,.08);line-height:1;position:absolute;bottom:.3rem;right:.6rem;z-index:3}
.trend-body{padding:1rem}
.trend-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.88rem;text-transform:uppercase;color:#f0ede6;margin-bottom:.25rem}
.trend-college{font-size:.68rem;color:#444;margin-bottom:.5rem}
.trend-regs{font-size:.72rem;font-weight:700;color:var(--accent)}

/* ── SUBMIT ── */
.submit-wrap{background:rgba(6,6,15,.97);padding:6rem 2rem;position:relative;z-index:2;border-top:1px solid rgba(0,229,255,.12)}
.form-card{max-width:820px;margin:0 auto;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);padding:2.5rem;backdrop-filter:blur(12px)}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent3),var(--accent2),var(--accent))}
.fsec-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:#f0ede6;line-height:1;margin-bottom:.4rem}
.fsec-sub{color:#444;font-size:.88rem;margin-bottom:2.5rem}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fg{display:flex;flex-direction:column;gap:.4rem}
.fg.full{grid-column:1/-1}
.flabel{font-size:.65rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#444}
.finput{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:.8rem 1rem;color:#f0ede6;font-size:.88rem;outline:none;transition:border-color .2s;width:100%}
.finput:focus{border-color:var(--accent)}
.finput::placeholder{color:rgba(240,237,230,.15)}
.fselect{background:#0a0a18;border:1px solid rgba(255,255,255,.08);padding:.8rem 1rem;color:#f0ede6;font-size:.88rem;outline:none;width:100%;transition:border-color .2s;appearance:none}
.fselect:focus{border-color:var(--accent)}
.fselect option{background:#0a0a18}
.ftextarea{resize:vertical;min-height:100px}
.sub-btn{margin-top:1.5rem;width:100%;background:var(--accent3);color:#fff;border:none;padding:1.1rem;font-family:'Syne',sans-serif;font-weight:900;font-size:1rem;transition:all .2s}
.sub-btn:hover:not(:disabled){background:#e05520;transform:translateY(-2px)}
.sub-btn:disabled{opacity:.5}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:2rem;right:2rem;z-index:99999;display:flex;flex-direction:column;gap:.6rem;pointer-events:none}
.toast{padding:.9rem 1.4rem;font-weight:700;font-size:.82rem;display:flex;align-items:center;gap:.65rem;min-width:270px;border:1px solid;animation:toastIn .3s ease;pointer-events:auto}
.toast.ok{background:#0a180a;border-color:var(--accent5);color:var(--accent5)}
.toast.err{background:#180a0a;border-color:var(--hot);color:var(--hot)}

/* ── FOOTER ── */
.footer{background:#040410;border-top:1px solid rgba(0,229,255,.1);padding:3rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:2rem;position:relative;z-index:2}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#f0ede6}
.footer-logo span{color:var(--brand)}
.soc{width:36px;height:36px;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#444;font-size:.85rem;text-decoration:none;transition:all .2s;cursor:none}
.soc:hover{border-color:var(--accent);color:var(--accent)}

/* ── CAT CARDS ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
.cat-card{border:1px solid rgba(255,255,255,.07);padding:1.4rem;transition:all .22s;cursor:none;background:rgba(255,255,255,.02);position:relative;overflow:hidden}
.cat-card::after{content:attr(data-n);position:absolute;bottom:-1.2rem;right:-.3rem;font-family:'Bebas Neue',sans-serif;font-size:6rem;opacity:.04;line-height:1;pointer-events:none;color:#fff}
.cat-card:hover{transform:translateY(-4px)}
.cat-emoji{font-size:2rem;margin-bottom:.75rem}
.cat-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:#f0ede6;margin-bottom:.25rem}
.cat-count{font-size:.68rem;font-weight:700}

/* ── PROFILE PAGE ── */
.profile-page{padding:7rem 2rem 4rem;max-width:900px;margin:0 auto;position:relative;z-index:2}
.profile-hero{background:rgba(255,255,255,.03);border:1px solid rgba(0,229,255,.15);padding:2.5rem;margin-bottom:2rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.profile-av-big{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent4));display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:900;color:#fff;flex-shrink:0;animation:glow 2.5s ease-in-out infinite}
.profile-big-name{font-family:'Syne',sans-serif;font-weight:900;font-size:1.8rem;color:#f0ede6;margin-bottom:.25rem}
.profile-big-email{font-size:.85rem;color:#444;margin-bottom:.75rem}
.profile-stat-row{display:flex;gap:2rem;flex-wrap:wrap}
.profile-stat{text-align:center}
.profile-stat-n{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);line-height:1}
.profile-stat-l{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#333}
.reg-list-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);padding:1.4rem;display:flex;align-items:center;gap:1.2rem;margin-bottom:.75rem;transition:all .2s}
.reg-list-card:hover{border-color:rgba(0,229,255,.2);background:rgba(0,229,255,.03)}
.reg-list-art{width:64px;height:64px;flex-shrink:0;overflow:hidden}
.reg-list-art canvas{width:100%;height:100%}
.reg-list-info{flex:1}
.reg-list-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:#f0ede6;margin-bottom:.2rem}
.reg-list-sub{font-size:.72rem;color:#444}
.reg-list-status{font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.25rem .7rem;border-radius:2px}
.status-confirmed{background:rgba(57,255,20,.12);border:1px solid rgba(57,255,20,.3);color:#39ff14}

@media(max-width:768px){
  .nav-center{display:none}
  .ev-grid{grid-template-columns:1fr}
  .fgrid,.info-grid,.reg-grid{grid-template-columns:1fr}
  .hstats{flex-direction:column}
  .hstat{border-right:none;border-bottom:1px solid rgba(255,255,255,.07)}
  .footer{flex-direction:column;text-align:center}
  .profile-hero{flex-direction:column;text-align:center}
  .profile-stat-row{justify-content:center}
  .hero{flex-direction:column;align-items:center}
  .hero-content{max-width:100%;padding-left:1.5rem;padding-right:1.5rem;align-items:center;text-align:center}
}

/* ── CONCERT BG CANVAS ── */
#concert-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

/* ── CURSOR TRAIL ── */
.cursor-trail-particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:99990;transform:translate(-50%,-50%);transition:opacity .4s}

/* ── THEME SWITCHER ── */
.theme-switcher{position:fixed;bottom:1.5rem;left:1.5rem;z-index:800;display:flex;flex-direction:column;gap:.3rem;background:rgba(7,7,16,0.85);border:1px solid rgba(255,255,255,.08);padding:.5rem;backdrop-filter:blur(12px)}
.theme-btn{width:34px;height:34px;border:1px solid rgba(255,255,255,.12);background:transparent;display:flex;align-items:center;justify-content:center;font-size:.8rem;cursor:none;transition:all .2s}
.theme-btn:hover,.theme-btn.active{border-color:var(--accent);background:rgba(0,229,255,.12)}
body:has(.overlay) .theme-switcher{display:none!important}
body:has(.overlay) .live-bar{display:none!important}
.theme-label{font-size:.5rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(240,237,230,.25);text-align:center;margin-top:.1rem}

/* ── THEME: LIGHT CREAM ── */
body.theme-cream{background:#f5f0e8;color:#1a1a2e}
body.theme-cream .nav{background:rgba(245,240,232,.92);border-bottom:1px solid rgba(0,229,255,.2)}
body.theme-cream .nav-logo,.body.theme-cream .nav-link{color:#1a1a2e}
body.theme-cream .ev-card{background:rgba(255,255,255,.8);border-color:rgba(0,0,0,.08);color:#1a1a2e}
body.theme-cream .ev-name,.body.theme-cream .modal-title{color:#1a1a2e}
body.theme-cream .hero-title{color:#1a1a2e}
body.theme-cream .hero-sub{color:rgba(26,26,46,.5)}
body.theme-cream .sec-title{color:#1a1a2e}
body.theme-cream .footer{background:#ede8e0;border-color:rgba(0,229,255,.15)}
body.theme-cream #bg-canvas{opacity:.15}

/* ── THEME: BRUTALIST ── */
body.theme-brutal{background:#000;color:#fff}
body.theme-brutal .nav{background:#000;border-bottom:3px solid #fff}
body.theme-brutal .nav-logo{color:#fff}
body.theme-brutal .nav-logo span{color:#fff}
body.theme-brutal .ev-card{background:#0a0a0a;border:2px solid #fff;border-radius:0}
body.theme-brutal .hero-title .pink{color:#fff;-webkit-text-stroke:2px #fff}
body.theme-brutal .hbtn.solid{background:#fff;border-color:#fff;color:#000}
body.theme-brutal #bg-canvas{opacity:.05}

/* ── AUDIO VISUALIZER ── */
.audio-viz{position:absolute;bottom:158px;left:0;right:0;height:55px;z-index:18;pointer-events:none;opacity:.35}
#viz-canvas{width:100%;height:100%}

/* ── SMART SEARCH AUTOCOMPLETE ── */
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:#0f0f20;border:1px solid rgba(0,229,255,.2);z-index:500;max-height:300px;overflow-y:auto;animation:slideDown .15s ease}
.search-dd-item{padding:.7rem 1.2rem;display:flex;align-items:center;gap:.75rem;cursor:none;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04)}
.search-dd-item:hover{background:rgba(0,229,255,.07)}
.search-dd-thumb{width:36px;height:36px;border-radius:2px;overflow:hidden;flex-shrink:0}
.search-dd-name{font-size:.8rem;font-weight:700;color:#f0ede6;margin-bottom:.1rem}
.search-dd-sub{font-size:.65rem;color:#555}
.search-dd-tag{font-size:.58rem;font-weight:800;padding:.15rem .4rem;background:rgba(0,229,255,.12);color:var(--accent);margin-left:.3rem}
.search-dd-empty{padding:1.2rem;text-align:center;color:#444;font-size:.8rem}

/* ── LEADERBOARD ── */
.leaderboard-wrap{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);overflow:hidden}
.lb-header{display:grid;grid-template-columns:40px 1fr auto auto;gap:.75rem;padding:.75rem 1.2rem;background:rgba(0,229,255,.04);border-bottom:1px solid rgba(0,229,255,.12);font-size:.6rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:#555}
.lb-row{display:grid;grid-template-columns:40px 1fr auto auto;gap:.75rem;padding:.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.04);align-items:center;transition:background .15s}
.lb-row:hover{background:rgba(255,255,255,.03)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#333;text-align:center}
.lb-rank.top1{color:#f5ff00}
.lb-rank.top2{color:#c0c0c0}
.lb-rank.top3{color:#cd7f32}
.lb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;flex-shrink:0}
.lb-name{font-weight:700;font-size:.85rem;color:#f0ede6}
.lb-college{font-size:.65rem;color:#444;margin-top:.1rem}
.lb-points{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);text-align:right}
.lb-events{font-size:.65rem;color:#444;text-align:right;margin-top:.15rem}

/* ── BADGES ── */
.badges-grid{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:1rem}
.badge-chip{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border:1px solid;font-size:.72rem;font-weight:700;letter-spacing:.04em;border-radius:0;position:relative;overflow:hidden;transition:all .2s}
.badge-chip.earned{animation:glow 2.5s ease-in-out infinite}
.badge-chip.locked{opacity:.3;filter:grayscale(1)}
.badge-chip .b-emoji{font-size:1.2rem}
.badge-chip .b-info{display:flex;flex-direction:column}
.badge-chip .b-name{font-weight:800;font-size:.72rem}
.badge-chip .b-desc{font-size:.58rem;opacity:.6}

/* ── SWIPE CARDS (MOBILE) ── */
.swipe-stack{position:relative;height:460px;perspective:800px;touch-action:none;max-width:380px;margin:0 auto}
.swipe-card{position:absolute;inset:0;background:rgba(15,15,30,0.98);border:1px solid rgba(255,255,255,.12);overflow:hidden;transform-origin:50% 110%;transition:transform .35s cubic-bezier(.25,.8,.25,1),opacity .3s;cursor:grab;touch-action:none;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.swipe-card:active{cursor:grabbing}
.swipe-card.swiped-right{transform:translateX(140%) rotate(18deg)!important;opacity:0!important;transition:transform .4s,opacity .3s}
.swipe-card.swiped-left{transform:translateX(-140%) rotate(-18deg)!important;opacity:0!important;transition:transform .4s,opacity .3s}
.swipe-card.swiped-up{transform:translateY(-130%) scale(0.9)!important;opacity:0!important;transition:transform .4s,opacity .3s}
.swipe-hint{display:flex;gap:2rem;justify-content:center;margin-top:1.5rem}
.swipe-hint-btn{display:flex;flex-direction:column;align-items:center;gap:.4rem;font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#444;cursor:none;transition:color .2s}
.swipe-hint-btn:hover{color:#f0ede6}
.swipe-hint-icon{width:44px;height:44px;border:1.5px solid;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;background:rgba(0,0,0,.4)}

/* ── AI RECOMMENDER ── */
.ai-panel{background:rgba(255,255,255,.02);border:1px solid rgba(0,229,255,.15);padding:2rem;position:relative;overflow:hidden}
.ai-panel::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,229,255,.04),rgba(0,229,255,.04));pointer-events:none}
.ai-panel-title{font-family:'Syne',sans-serif;font-weight:900;font-size:1.1rem;color:#f0ede6;margin-bottom:.3rem;display:flex;align-items:center;gap:.6rem}
.ai-panel-sub{font-size:.75rem;color:#444;margin-bottom:1.5rem}
.ai-rec-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);padding:1rem;display:flex;gap:.85rem;align-items:flex-start;margin-bottom:.75rem;transition:all .2s;cursor:none}
.ai-rec-card:hover{border-color:rgba(0,229,255,.25);background:rgba(0,229,255,.04)}
.ai-rec-art{width:56px;height:56px;flex-shrink:0;border-radius:2px;overflow:hidden}
.ai-rec-name{font-weight:800;font-size:.85rem;color:#f0ede6;margin-bottom:.25rem}
.ai-rec-reason{font-size:.68rem;color:#666;line-height:1.5}
.ai-rec-tag{font-size:.58rem;font-weight:800;padding:.15rem .5rem;background:rgba(155,77,255,.15);color:var(--accent);margin-top:.4rem;display:inline-block}
.ai-loading{display:flex;align-items:center;gap:.75rem;color:#666;font-size:.82rem;padding:1rem}
.ai-loading-dots{display:flex;gap:.3rem}
.ai-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(40px);transition:opacity .7s cubic-bezier(.25,.8,.25,1),transform .7s cubic-bezier(.25,.8,.25,1)}
.reveal.from-left{transform:translateX(-60px)}
.reveal.from-right{transform:translateX(60px)}
.reveal.visible{opacity:1;transform:translate(0)}
.split-letter{display:inline-block;opacity:0;transform:translateY(20px);transition:opacity .4s,transform .4s}
.split-letter.visible{opacity:1;transform:translateY(0)}

/* ── TILT CARD ── */
.ev-card{transform-style:preserve-3d}
.ev-card .ev-art canvas{transition:transform .3s}

/* ── CAMPUS POINTS / LEADERBOARD SECTION ── */
.points-section{padding:4rem 2rem;position:relative;z-index:2;background:linear-gradient(180deg,rgba(6,6,15,0),rgba(0,229,255,.03),rgba(7,7,16,0));max-width:1400px;margin:0 auto}
.lb-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.lb-tab{padding:.5rem 1.2rem;font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(240,237,230,.4);transition:all .18s;cursor:none}
.lb-tab.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.07)}

/* ── WEEK BADGE ── */
.week-badge{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .6rem;background:rgba(245,255,0,.1);border:1px solid rgba(245,255,0,.3);color:#f5ff00;margin-left:.75rem;vertical-align:middle}

/* ═══ FEATURE 1: LIVE COUNTER BAR ═══ */
.live-bar{background:rgba(4,4,14,.95);border-bottom:1px solid rgba(255,61,61,.18);padding:.5rem 2rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap;position:sticky;top:60px;z-index:599}
.live-badge{display:inline-flex;align-items:center;gap:.45rem;background:rgba(255,61,61,.08);border:1px solid rgba(255,61,61,.22);color:#ff6e6e;font-size:.63rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:.26rem .75rem}
.live-dot-pulse{width:6px;height:6px;background:#ff3d3d;border-radius:50%;animation:pulse 1s ease-in-out infinite;flex-shrink:0}
.live-pill{font-size:.65rem;font-weight:700;color:rgba(240,237,230,.35);display:flex;align-items:center;gap:.3rem;letter-spacing:.03em}
.live-pill b{color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:.92rem}

/* ═══ FEATURE 3: DATE QUICK FILTER ═══ */
.date-filter{display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap;padding:.6rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}
.df-chip{padding:.38rem 1rem;font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(240,237,230,.4);transition:all .18s;cursor:none;white-space:nowrap}
.df-chip:hover{border-color:var(--accent2);color:var(--accent2)}
.df-chip.df-on{background:var(--accent2);border-color:var(--accent2);color:#0a0a0a}

/* ═══ FEATURE 6: WISHLIST HEART ═══ */
.heart-btn{position:absolute !important;top:.65rem;right:.65rem;width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.18);background:rgba(6,6,15,.75);display:flex;align-items:center;justify-content:center;font-size:.8rem;z-index:9;transition:all .18s;backdrop-filter:blur(6px);cursor:none;color:rgba(255,255,255,.45)}
.heart-btn:hover,.heart-btn.h-on{border-color:#ff2d9b;background:rgba(255,45,155,.15);color:#ff2d9b;transform:scale(1.12)}

/* ═══ FEATURE 7: DELHI MAP ═══ */
.map-section{padding:0 2rem 5rem;max-width:1400px;margin:0 auto;position:relative;z-index:2}
.map-box{position:relative;background:#04040e;border:1px solid rgba(0,229,255,.12);overflow:hidden}
.map-box canvas{display:block}
.map-tooltip{position:absolute;background:#08081e;border:1px solid rgba(0,229,255,.28);padding:.7rem 1rem;pointer-events:none;z-index:40;min-width:185px;max-width:250px;animation:fadeIn .12s ease;box-shadow:0 8px 28px rgba(0,0,0,.7)}
.map-tip-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.88rem;color:#f0ede6;margin-bottom:.15rem}
.map-tip-area{font-size:.6rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.35rem}
.map-tip-count{font-size:.7rem;color:rgba(240,237,230,.45)}

/* ═══ FEATURE 10: SNAP SCROLL ROW ═══ */
.snap-wrap{position:relative;margin:0 -2rem}
.snap-row{display:flex;gap:1.2rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 2rem .5rem}
.snap-row::-webkit-scrollbar{display:none}
.snap-arrow{position:absolute;top:40%;transform:translateY(-50%);width:38px;height:38px;background:rgba(6,6,15,.92);border:1px solid rgba(0,229,255,.25);color:#00e5ff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .18s;cursor:none;line-height:1}
.snap-arrow:hover{background:rgba(0,229,255,.1)}
.snap-arrow.sa-l{left:2rem}.snap-arrow.sa-r{right:2rem}
.snap-card{min-width:288px;max-width:288px;scroll-snap-align:start;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);overflow:hidden;flex-shrink:0;transition:transform .24s,border-color .24s,box-shadow .24s;cursor:none;position:relative}
.snap-card:hover{transform:translateY(-5px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.snap-art{height:165px;overflow:hidden;position:relative}
.snap-art canvas{width:100%;height:100%;display:block}
.snap-body{padding:1rem}
.snap-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;text-transform:uppercase;color:#f0ede6;line-height:1.2;margin-bottom:.4rem}
.snap-info{font-size:.7rem;color:rgba(240,237,230,.4);margin-bottom:.22rem}
.snap-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.7rem;padding-top:.7rem;border-top:1px solid rgba(255,255,255,.06)}
.snap-prize{font-family:'Bebas Neue',sans-serif;font-size:1.1rem}
.snap-btn{font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:var(--accent3);color:#fff;padding:.35rem .8rem;border:none;cursor:none;transition:background .18s}
.snap-btn:hover{background:#e0521d}

/* ═══ FEATURE 11: QR PASS ═══ */
.qr-pass{background:linear-gradient(135deg,#070719,#0c0c26);border:1px solid rgba(0,229,255,.18);position:relative;overflow:hidden;transition:box-shadow .2s}
.qr-pass:hover{box-shadow:0 10px 36px rgba(0,229,255,.07)}
.qr-pass::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent3),var(--accent4),var(--accent))}
.qr-pass-top{padding:.9rem 1.1rem .7rem;border-bottom:1px dashed rgba(255,255,255,.07)}
.qr-pass-name{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:#f0ede6;line-height:1.15;margin-bottom:.2rem}
.qr-pass-college{font-size:.65rem;color:rgba(240,237,230,.38)}
.qr-pass-body{padding:.8rem 1.1rem;display:flex;gap:.9rem;align-items:flex-start}
.qr-code{flex-shrink:0;background:#fff;padding:5px;width:74px;height:74px;display:flex;align-items:center;justify-content:center}
.qr-details{flex:1;min-width:0}
.qr-row{display:flex;gap:.35rem;font-size:.63rem;margin-bottom:.26rem;line-height:1.3}
.qr-lbl{color:#3a3a4a;font-weight:700;min-width:44px;flex-shrink:0}
.qr-val{color:#f0ede6;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qr-pass-foot{padding:.5rem 1.1rem;background:rgba(0,229,255,.03);border-top:1px dashed rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center}
.qr-pass-id{font-family:'Bebas Neue',sans-serif;font-size:.88rem;color:var(--accent);letter-spacing:.04em}
.qr-status{font-size:.56rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#39ff14;display:flex;align-items:center;gap:.28rem}

/* ═══ BACK TO TOP ═══ */
.btt{position:fixed;bottom:5.5rem;right:1.5rem;width:36px;height:36px;background:rgba(6,6,15,.92);border:1px solid rgba(0,229,255,.22);color:var(--accent);font-size:.85rem;display:flex;align-items:center;justify-content:center;z-index:799;transition:all .22s;cursor:none;opacity:0;pointer-events:none;transform:translateY(8px)}
.btt.btt-show{opacity:1;pointer-events:auto;transform:translateY(0)}
.btt:hover{background:rgba(0,229,255,.1)}
</style>

/* ════════════════════════════════════════════
   GLOBAL BACKGROUND — Words + Music Waves
════════════════════════════════════════════ */
function initGlobalBg() {
  const canvas = document.getElementById("bg-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;
  window.addEventListener("resize", () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

  const WORDS = ["FEST","MUN","DANCE","DEBATE","MUSIC","POETRY","TECH","HACKATHON","CONCERT","SLAM","BATTLE","RENDEZVOUS","ENGIFEST","SPANDAN","DTU","IIT","AIIMS","DU","JAMIA","BEATS","GROOVE","VERSE","CODE","RHYTHM","VIBE","CULTURE","YOUTH","DELHI","NCR","COLLEGE","COMPETE","WIN","CREATE","PERFORM"];
  const COLORS = ["rgba(0,229,255,", "rgba(245,255,0,", "rgba(0,245,255,", "rgba(255,107,0,", "rgba(191,95,255,", "rgba(57,255,20,"];

  // Floating words
  const words = Array.from({length: 28}, (_, i) => ({
    text: WORDS[i % WORDS.length],
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -0.15 - Math.random() * 0.25,
    size: 11 + Math.floor(Math.random() * 18),
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    alpha: 0.06 + Math.random() * 0.1,
    life: Math.random() * 200,
    maxLife: 180 + Math.random() * 120,
    rotation: (Math.random() - 0.5) * 0.3,
    rotV: (Math.random() - 0.5) * 0.003,
  }));

  // Music wave bands
  const bands = Array.from({length: 7}, (_, i) => ({
    x: (i / 6) * W,
    phase: Math.random() * Math.PI * 2,
    speed: 0.008 + Math.random() * 0.012,
    amp: 30 + Math.random() * 60,
    color: COLORS[i % COLORS.length],
    width: 1.5 + Math.random() * 1.5,
  }));

  // Particles
  const particles = Array.from({length: 60}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
    r: 0.8 + Math.random() * 1.8,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    alpha: 0.3 + Math.random() * 0.5,
  }));

  let t = 0;
  let raf;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    t += 1;

    // ── Music wave lines across full bg ──
    bands.forEach(b => {
      b.phase += b.speed;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 4) {
        const y = H * 0.5 + Math.sin(x * 0.008 + b.phase) * b.amp * Math.sin(t * 0.005 + b.phase);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = b.color + "0.04)";
      ctx.lineWidth = b.width;
      ctx.stroke();
    });

    // ── Secondary horizontal waves ──
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      const baseY = H * (0.2 + i * 0.2);
      for (let x = 0; x <= W; x += 3) {
        const y = baseY + Math.sin(x * 0.012 + t * 0.007 + i * 1.2) * (20 + i * 15) * Math.cos(t * 0.003 + i);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(0,229,255,0.02)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // ── Floating words ──
    words.forEach(w => {
      w.life++;
      w.x += w.vx;
      w.y += w.vy;
      w.rotation += w.rotV;
      // fade in/out
      const progress = w.life / w.maxLife;
      const opacity = progress < 0.15 ? progress / 0.15 : progress > 0.8 ? (1 - progress) / 0.2 : 1;
      ctx.save();
      ctx.translate(w.x, w.y);
      ctx.rotate(w.rotation);
      ctx.font = `900 ${w.size}px 'Bebas Neue', monospace`;
      ctx.letterSpacing = "0.15em";
      ctx.fillStyle = w.color + (w.alpha * opacity) + ")";
      ctx.fillText(w.text, 0, 0);
      ctx.restore();

      if (w.life >= w.maxLife || w.y < -50 || w.y > H + 50 || w.x < -200 || w.x > W + 200) {
        w.x = Math.random() * W;
        w.y = H + 20;
        w.life = 0;
        w.text = WORDS[Math.floor(Math.random() * WORDS.length)];
        w.vy = -0.15 - Math.random() * 0.25;
        w.vx = (Math.random() - 0.5) * 0.3;
        w.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      }
    });

    // ── Particles ──
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ")";
      ctx.fill();
    });

    // ── Connect nearby particles ──
    ctx.strokeStyle = "rgba(0,229,255,0.03)";
    ctx.lineWidth = 0.5;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

/* ════════════════════════════════════════════
   AI-GENERATED CANVAS ART per event category
════════════════════════════════════════════ */
function generateEventArt(canvas, cat, seed, w = 400, h = 220) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = w; canvas.height = h;
  const rng = (() => { let s = seed * 9301 + 49297; return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; }; })();

  const palettes = {
    concert: ["#ff2d9b","#ff66cc","#9b4dff","#4d1a7f","#1a0030"],
    music:   ["#ff6b00","#ff9944","#ffcc00","#cc3300","#2d0a00"],
    dance:   ["#f5ff00","#00ff88","#00ccff","#ff2d9b","#001a0d"],
    literary:["#00d4ff","#0088cc","#004466","#00ffcc","#001122"],
    mun:     ["#9b4dff","#6600cc","#3300aa","#cc88ff","#110022"],
    fest:    ["#ff6b00","#ff2d9b","#f5ff00","#ff4400","#1a0500"],
    tech:    ["#39ff14","#00ff88","#00d4ff","#006600","#001100"],
    poetry:  ["#bf5fff","#ff2d9b","#7700cc","#ffaaff","#110019"],
  };
  const pal = palettes[cat] || palettes.concert;

  // Dark gradient base
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, pal[4] || "#000");
  grad.addColorStop(0.5, pal[3] + "dd" || "#111");
  grad.addColorStop(1, pal[4] || "#000");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  if (cat === "concert" || cat === "music") {
    // Stage lights beams
    const beams = 7;
    for (let i = 0; i < beams; i++) {
      const x = (w / (beams - 1)) * i;
      const col = pal[i % 3];
      const lg = ctx.createLinearGradient(x, 0, x + (rng()-0.5)*80, h);
      lg.addColorStop(0, col + "cc");
      lg.addColorStop(0.4, col + "44");
      lg.addColorStop(1, col + "00");
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x - 40 + rng()*80, h);
      ctx.lineTo(x + 40 + rng()*80, h);
      ctx.closePath();
      ctx.fillStyle = lg;
      ctx.fill();
    }
    // Crowd silhouette
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.beginPath();
    ctx.moveTo(0, h);
    for (let x = 0; x <= w; x += 8) {
      const baseY = h * 0.72 + Math.sin(x * 0.15) * 8;
      const spike = rng() > 0.85 ? -18 - rng()*12 : 0;
      ctx.lineTo(x, baseY + spike);
    }
    ctx.lineTo(w, h); ctx.closePath(); ctx.fill();
    // Disco glitter dots
    for (let i = 0; i < 60; i++) {
      ctx.beginPath();
      ctx.arc(rng()*w, rng()*h*0.7, 1.5 + rng()*2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${0.3 + rng()*0.7})`;
      ctx.fill();
    }
    // Bass wave at bottom
    ctx.beginPath();
    for (let x = 0; x <= w; x += 3) {
      const y = h*0.85 + Math.sin(x*0.08)*15*Math.cos(x*0.03);
      x === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle = pal[0] + "aa"; ctx.lineWidth = 2.5; ctx.stroke();

  } else if (cat === "dance") {
    // Dynamic diagonal stripes
    for (let i = -3; i < 12; i++) {
      const x = i * (w / 8);
      const hue = i * 40;
      ctx.beginPath();
      ctx.moveTo(x, 0); ctx.lineTo(x + w*0.2, h);
      ctx.strokeStyle = pal[i%3] + (rng() > 0.5 ? "44" : "22");
      ctx.lineWidth = 20 + rng()*30;
      ctx.stroke();
    }
    // Figure silhouette (dancer)
    const cx = w*0.5, cy = h*0.55;
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    // Body
    ctx.beginPath(); ctx.ellipse(cx, cy, 12, 22, 0, 0, Math.PI*2); ctx.fill();
    // Head
    ctx.beginPath(); ctx.arc(cx, cy-28, 10, 0, Math.PI*2); ctx.fill();
    // Arms spread
    ctx.beginPath(); ctx.moveTo(cx-12, cy-5); ctx.lineTo(cx-45, cy-25); ctx.strokeStyle = "rgba(0,0,0,0.85)"; ctx.lineWidth = 6; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+12, cy-5); ctx.lineTo(cx+45, cy-25); ctx.stroke();
    // Legs
    ctx.beginPath(); ctx.moveTo(cx-5, cy+18); ctx.lineTo(cx-22, cy+50); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+5, cy+18); ctx.lineTo(cx+28, cy+48); ctx.stroke();
    // Spotlight on dancer
    const spotGrad = ctx.createRadialGradient(cx, cy, 5, cx, cy, 80);
    spotGrad.addColorStop(0, "rgba(245,255,0,0.25)");
    spotGrad.addColorStop(1, "transparent");
    ctx.fillStyle = spotGrad; ctx.beginPath(); ctx.arc(cx, cy, 80, 0, Math.PI*2); ctx.fill();

  } else if (cat === "literary" || cat === "mun") {
    // Elegant hall perspective lines
    const vp = { x: w*0.5, y: h*0.35 };
    ctx.strokeStyle = "rgba(0,212,255,0.12)"; ctx.lineWidth = 1;
    for (let i = 0; i < 14; i++) {
      const x = (w/13)*i;
      ctx.beginPath(); ctx.moveTo(vp.x, vp.y); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let j = 0; j < 6; j++) {
      const y = vp.y + j*(h-vp.y)/5;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    }
    // Podium silhouette
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(w*0.4, h*0.55, w*0.2, h*0.45);
    ctx.fillRect(w*0.42, h*0.48, w*0.16, h*0.08);
    // Person at podium
    ctx.beginPath(); ctx.arc(w*0.5, h*0.42, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(w*0.46, h*0.51, 8, 14);
    // Globe for MUN
    if (cat === "mun") {
      ctx.beginPath(); ctx.arc(w*0.8, h*0.3, 28, 0, Math.PI*2);
      const gGrad = ctx.createRadialGradient(w*0.8, h*0.3, 5, w*0.8, h*0.3, 28);
      gGrad.addColorStop(0, "rgba(191,95,255,0.5)"); gGrad.addColorStop(1, "rgba(191,95,255,0.1)");
      ctx.fillStyle = gGrad; ctx.fill();
      ctx.strokeStyle = "rgba(191,95,255,0.4)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(w*0.8, h*0.3, 28, 10, 0, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(w*0.8, h*0.3, 10, 28, Math.PI*0.4, 0, Math.PI*2); ctx.stroke();
    }
    // Document lines floating
    for (let i = 0; i < 8; i++) {
      const lx = w*0.05 + rng()*w*0.3, ly = h*0.1 + rng()*h*0.7;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 40 + rng()*30, ly);
      ctx.strokeStyle = `rgba(0,212,255,${0.05+rng()*0.1})`; ctx.lineWidth = 2; ctx.stroke();
    }

  } else if (cat === "tech") {
    // Circuit board pattern
    ctx.strokeStyle = "rgba(57,255,20,0.12)"; ctx.lineWidth = 1;
    for (let i = 0; i < 12; i++) {
      const x = rng()*w, y = rng()*h;
      ctx.beginPath(); ctx.moveTo(x,y);
      const segs = 4 + Math.floor(rng()*4);
      let cx2=x, cy2=y;
      for (let s=0;s<segs;s++) {
        const dir = Math.floor(rng()*4);
        const len = 20+rng()*50;
        const nx = cx2+(dir===0?len:dir===1?-len:0);
        const ny = cy2+(dir===2?len:dir===3?-len:0);
        ctx.lineTo(nx,ny);
        cx2=nx; cy2=ny;
      }
      ctx.stroke();
      // Node circles
      ctx.beginPath(); ctx.arc(cx2,cy2,3,0,Math.PI*2);
      ctx.fillStyle = "rgba(57,255,20,0.5)"; ctx.fill();
    }
    // Binary rain streaks
    for (let i = 0; i < 20; i++) {
      ctx.font = `bold ${10+rng()*6}px monospace`;
      ctx.fillStyle = `rgba(57,255,20,${0.06+rng()*0.12})`;
      ctx.fillText(rng()>0.5?"1":"0", rng()*w, rng()*h);
    }
    // Glowing CPU in center
    const ccx=w*0.5, ccy=h*0.5;
    const cpuGrad = ctx.createRadialGradient(ccx,ccy,5,ccx,ccy,55);
    cpuGrad.addColorStop(0,"rgba(57,255,20,0.3)"); cpuGrad.addColorStop(1,"transparent");
    ctx.fillStyle = cpuGrad; ctx.beginPath(); ctx.arc(ccx,ccy,55,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(57,255,20,0.4)"; ctx.lineWidth = 1.5;
    ctx.strokeRect(ccx-18,ccy-18,36,36);
    // Pins
    for (let i=0;i<6;i++) {
      ctx.beginPath(); ctx.moveTo(ccx-18, ccy-12+i*5); ctx.lineTo(ccx-26,ccy-12+i*5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ccx+18, ccy-12+i*5); ctx.lineTo(ccx+26,ccy-12+i*5); ctx.stroke();
    }

  } else if (cat === "poetry") {
    // Ink splash + flowing text lines
    const splashGrad = ctx.createRadialGradient(w*0.5,h*0.45,10,w*0.5,h*0.45,100);
    splashGrad.addColorStop(0,"rgba(191,95,255,0.4)");
    splashGrad.addColorStop(1,"transparent");
    ctx.fillStyle = splashGrad; ctx.beginPath(); ctx.arc(w*0.5,h*0.45,100,0,Math.PI*2); ctx.fill();
    // Flowing text lines
    ctx.font = "italic bold 11px Georgia, serif";
    const lines = ["कभी कभी","words flow like","शायरी","slam poetry","ink & soul","दिल की बात","verses fly","✦"];
    lines.forEach((l,i) => {
      const lx = 20+rng()*w*0.5, ly = 25+i*(h/lines.length);
      ctx.save();
      ctx.translate(lx,ly);
      ctx.rotate((rng()-0.5)*0.2);
      ctx.fillStyle = `rgba(191,95,255,${0.1+rng()*0.2})`;
      ctx.fillText(l,0,0);
      ctx.restore();
    });
    // Ink drops
    for (let i=0;i<12;i++) {
      const ix=rng()*w, iy=rng()*h, ir=2+rng()*8;
      ctx.beginPath(); ctx.ellipse(ix,iy,ir,ir*1.5,rng()*Math.PI,0,Math.PI*2);
      ctx.fillStyle=`rgba(191,95,255,${0.08+rng()*0.15})`; ctx.fill();
    }

  } else if (cat === "fest") {
    // Festival fireworks
    for (let f=0;f<6;f++) {
      const fx=rng()*w, fy=rng()*h*0.6;
      const fColor = pal[f%3];
      for (let r=0;r<20;r++) {
        const angle = (r/20)*Math.PI*2;
        const len = 20+rng()*35;
        ctx.beginPath();
        ctx.moveTo(fx,fy);
        ctx.lineTo(fx+Math.cos(angle)*len, fy+Math.sin(angle)*len);
        ctx.strokeStyle = fColor+(rng()>0.5?"88":"44");
        ctx.lineWidth = 1.5+rng();
        ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2);
      ctx.fillStyle = fColor+"dd"; ctx.fill();
    }
    // Confetti
    for (let i=0;i<40;i++) {
      ctx.save();
      ctx.translate(rng()*w, rng()*h);
      ctx.rotate(rng()*Math.PI*2);
      ctx.fillStyle = pal[Math.floor(rng()*pal.length)]+(rng()>0.5?"aa":"66");
      ctx.fillRect(-4,-2,8,4);
      ctx.restore();
    }
  }

  // Noise/grain overlay
  for (let i=0;i<1200;i++) {
    ctx.beginPath();
    ctx.rect(rng()*w, rng()*h, 1, 1);
    ctx.fillStyle = `rgba(255,255,255,${rng()*0.04})`;
    ctx.fill();
  }
  // Bottom gradient fade
  const fadeGrad = ctx.createLinearGradient(0, h*0.6, 0, h);
  fadeGrad.addColorStop(0, "transparent");
  fadeGrad.addColorStop(1, "rgba(7,7,16,0.85)");
  ctx.fillStyle = fadeGrad; ctx.fillRect(0, 0, w, h);
}

/* ════════════════════════════════════════════
   REAL API — calls Next.js backend routes
   Registrations stored in localStorage so they
   survive page navigation within the session.

// ── localStorage-backed registration store ──
const LOCAL_REGS_KEY = 'cb_regs_v1';
function loadLocalRegs() {
  try { return JSON.parse(localStorage.getItem(LOCAL_REGS_KEY) || '[]'); }
  catch { return []; }
}
function saveLocalReg(reg) {
  const all = loadLocalRegs();
  all.unshift(reg);
  try { localStorage.setItem(LOCAL_REGS_KEY, JSON.stringify(all)); } catch {}
}

// ── Email stored after first registration (used to fetch regs from server) ──
function getStoredEmail() {
  try { return localStorage.getItem('cb_user_email') || ''; } catch { return ''; }
}
function storeEmail(email) {
  try { localStorage.setItem('cb_user_email', email); } catch {}
}

// ── Fake logged-in user (based on stored email) ──
function getLocalUser() {
  const email = getStoredEmail();
  const name = localStorage.getItem('cb_user_name') ? localStorage.getItem('cb_user_name').trim() : null;
  if(!name || !localStorage.getItem('cb_token')){return null;}return { name, email, college: '', avatar: name[0].toUpperCase() };
}

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  return res.json();
}

const API = {
  async query({ cat, search, page = 1, limit = 27 } = {}) {
    const params = new URLSearchParams();
    if (cat && cat !== 'all') params.set('cat', cat);
    if (search) params.set('search', search);
    params.set('page', page);
    params.set('limit', limit);
    try {
      return await apiFetch('/api/events?' + params);
    } catch {
      return { events: [], total: 0, pages: 1 };
    }
  },

  async trending() {
    try { return await apiFetch('/api/events/trending'); }
    catch { return []; }
  },

  async closing() {
    try { return await apiFetch('/api/events/closing'); }
    catch { return []; }
  },

  async stats() {
    try { return await apiFetch('/api/events/stats'); }
    catch { return { events: 12, colleges: 8, prize: 5000000, regs: 15000 }; }
  },

  async register(eventId, { name, email, phone, college }) {
    try {
      const data = await apiFetch('/api/registrations', {
        method: 'POST',
        body: JSON.stringify({ eventId, name, email, phone, college }),
      });
      if (data.ok) {
        storeEmail(email);
        try { localStorage.setItem('cb_user_name', name); } catch {}
        saveLocalReg({
          regId: data.regId,
          eventId,
          name, email, phone, college,
          regAt: Date.now(),
        });
      }
      return data;
    } catch {
      return { ok: false, msg: 'Network error. Try again.' };
    }
  },

  async submit(formData) {
    try {
      return await apiFetch('/api/submissions', {
        method: 'POST',
        body: JSON.stringify(formData),
      });
    } catch {
      return { ok: false, msg: 'Network error. Try again.' };
    }
  },

  getUser() { return getLocalUser(); },
  getAllEvents() { try { const c=localStorage.getItem("cb_events_cache"); return c?JSON.parse(c):[]; } catch{return[];} },
  getMyRegs() { return loadLocalRegs(); },
};

// For backward compat — db.getEvent used in MyRegsPage
// We cache fetched events so we can look them up offline
const _eventCache = {};
const db = {
  getEvent(id) { return _eventCache[id] || null; },
};

// Populate event cache whenever we fetch events
const _origQuery = API.query.bind(API);
API.query = async function(p) {
  const r = await _origQuery(p);
  (r.events || []).forEach(e => { _eventCache[e.id || e.slug] = e; });
  return r;
};
const _origTrending = API.trending.bind(API);
API.trending = async function() {
  const r = await _origTrending();
  (Array.isArray(r) ? r : []).forEach(e => { _eventCache[e.id || e.slug] = e; });
  return r;
};

const Ctx=createContext(null);

function useCD(dl){
  const[t,st]=useState({d:0,h:0,m:0,s:0});
  useEffect(()=>{
    const tick=()=>{const diff=Math.max(0,dl-Date.now());st({d:Math.floor(diff/864e5),h:Math.floor((diff%864e5)/36e5),m:Math.floor((diff%36e5)/6e4),s:Math.floor((diff%6e4)/1e3)});};
    tick();const id=setInterval(tick,1e3);return()=>clearInterval(id);
  },[dl]);
  return t;
}

/* ════════════════════════════════════════════
   CURSOR + TRAIL
════════════════════════════════════════════ */
function Cursor(){
  const dot=useRef(null),ring=useRef(null),m=useRef({x:0,y:0}),rp=useRef({x:0,y:0});
  useEffect(()=>{
    const TRAIL_COLORS=["#ff2d9b","#f5ff00","#00f5ff","#9b4dff","#ff6b00"];
    let trailId=0;
    const createTrail=(x,y)=>{
      const el=document.createElement("div");
      el.className="cursor-trail-particle";
      const color=TRAIL_COLORS[trailId%TRAIL_COLORS.length];
      el.style.cssText=`left:${x}px;top:${y}px;background:${color};box-shadow:0 0 6px ${color};`;
      document.body.appendChild(el);
      trailId++;
      let size=6,opacity=0.8;
      const fade=()=>{size*=0.93;opacity*=0.88;el.style.width=el.style.height=size+"px";el.style.opacity=opacity;if(opacity>0.02)requestAnimationFrame(fade);else el.remove();};
      requestAnimationFrame(fade);
    };
    let lastTrail=0;
    const mv=e=>{
      m.current={x:e.clientX,y:e.clientY};
      if(dot.current){dot.current.style.left=e.clientX+"px";dot.current.style.top=e.clientY+"px";}
      if(Date.now()-lastTrail>30){createTrail(e.clientX,e.clientY);lastTrail=Date.now();}
    };
    window.addEventListener("mousemove",mv);
    let raf;const anim=()=>{rp.current.x+=(m.current.x-rp.current.x)*.11;rp.current.y+=(m.current.y-rp.current.y)*.11;if(ring.current){ring.current.style.left=rp.current.x+"px";ring.current.style.top=rp.current.y+"px";}raf=requestAnimationFrame(anim);};
    anim();return()=>{window.removeEventListener("mousemove",mv);cancelAnimationFrame(raf);};
  },[]);
  return<><div ref={dot} className="cur"/><div ref={ring} className="cur-ring"/></>;
}
